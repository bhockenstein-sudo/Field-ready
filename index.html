<title>Field Ready — Advanced First Aid Refresher</title>

<style>
  :root{
    --accent:#0E8C84; --accent-press:#0A736C; --on-accent:#FFFFFF;
    --ink:#0B1620; --muted:#566B78; --faint:#8A9AA6; --line:rgba(20,40,55,.10);
    --vital-good:#1F9D57; --vital-fade:#DE8E1F; --vital-low:#CF5130; --vital-new:#9CB0BC;
    --glass:rgba(255,255,255,.55); --glass-brd:rgba(255,255,255,.62); --glass-hi:rgba(255,255,255,.9);
    --glass-2:rgba(255,255,255,.42); --track:rgba(20,40,55,.10);
    --good-bg:rgba(31,157,87,.12); --good-line:rgba(31,157,87,.35);
    --bad-bg:rgba(207,81,48,.12); --bad-line:rgba(207,81,48,.35);
    --alert-bg:rgba(222,142,31,.12); --alert-line:rgba(222,142,31,.4); --alert-ink:#9A5E12;
    --shadow:0 8px 30px rgba(20,45,65,.10);
    --grad:linear-gradient(168deg,#E6EEF4 0%,#D7E4EC 46%,#E8E0F0 100%);
    --sys:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
    --sans:var(--sys);
  }
  [data-theme="dark"]{
    --accent:#2DBBAE; --accent-press:#26A095; --on-accent:#04201E;
    --ink:#EEF3F7; --muted:#9FB0BD; --faint:#6E7E88; --line:rgba(255,255,255,.12);
    --vital-good:#34C77A; --vital-fade:#E7B84B; --vital-low:#E2664A; --vital-new:#42525C;
    --glass:rgba(255,255,255,.085); --glass-brd:rgba(255,255,255,.14); --glass-hi:rgba(255,255,255,.18);
    --glass-2:rgba(255,255,255,.06); --track:rgba(255,255,255,.13);
    --good-bg:rgba(52,199,122,.14); --good-line:rgba(52,199,122,.35);
    --bad-bg:rgba(226,102,74,.16); --bad-line:rgba(226,102,74,.4);
    --alert-bg:rgba(231,184,75,.14); --alert-line:rgba(231,184,75,.36); --alert-ink:#E7B84B;
    --shadow:0 10px 34px rgba(0,0,0,.4);
    --grad:linear-gradient(168deg,#0E151C 0%,#0A1822 50%,#15131F 100%);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--grad);background-attachment:fixed;color:var(--ink);
    -webkit-font-smoothing:antialiased}
  #root{max-width:520px;margin:0 auto;min-height:100vh;background:var(--grad);background-attachment:fixed;
    position:relative;overflow:hidden}
  @media(min-width:540px){#root{box-shadow:0 0 80px rgba(0,0,0,.28)}}

  /* frosted top bar */
  .topbar{background:var(--glass);backdrop-filter:blur(20px) saturate(1.7);-webkit-backdrop-filter:blur(20px) saturate(1.7);
    border-bottom:1px solid var(--line);padding:13px 18px;padding-top:calc(13px + env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
  .brand{display:flex;align-items:center;gap:9px}
  .mark{width:26px;height:26px;flex:0 0 auto}
  .mark circle{fill:var(--accent)} .mark path{stroke:#fff}
  .brandname{font-weight:700;letter-spacing:-.01em;font-size:15px;color:var(--ink)}
  .topright{display:flex;align-items:center;gap:13px}
  .topstats{display:flex;gap:14px;text-align:right}
  .topstats b{font-size:15px;display:block;color:var(--ink);font-weight:700;font-family:var(--mono)}
  .topstats span{color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-size:9px}
  .iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--glass-brd);background:var(--glass-2);
    color:var(--ink);display:grid;place-items:center;cursor:pointer;padding:0;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .iconbtn svg{width:18px;height:18px}
  .iconbtn:active{transform:scale(.94)}

  .screen{padding:14px 16px 116px}
  .eyebrow{text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:var(--muted);font-weight:600;margin:0 2px 5px}
  .h1{font-weight:800;font-size:32px;line-height:1.02;letter-spacing:-.03em;margin:0 0 16px;color:var(--ink)}
  .h2{font-weight:700;font-size:17px;letter-spacing:-.01em;margin:24px 0 13px 2px;color:var(--ink)}

  /* glass cards */
  .card{background:var(--glass);backdrop-filter:blur(22px) saturate(1.7);-webkit-backdrop-filter:blur(22px) saturate(1.7);
    border:1px solid var(--glass-brd);border-radius:22px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
  .dose-card{}
  .dose-card .eyebrow{color:var(--accent)}
  .dose-h{font-weight:700;font-size:20px;letter-spacing:-.01em;margin:4px 0 6px;color:var(--ink)}
  .dose-sub{color:var(--muted);font-size:13.5px;margin:0 0 16px;line-height:1.45}
  .alert{background:var(--alert-bg);border-color:var(--alert-line)}
  .alert .label{color:var(--alert-ink)} .alert .muted{color:var(--alert-ink);opacity:.9}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;
    font-family:var(--sans);font-weight:600;font-size:16px;letter-spacing:-.01em;padding:14px 18px;cursor:pointer;width:100%;
    transition:transform .06s ease,background-color .15s ease}
  .btn:active{transform:scale(.98)}
  .btn-amber,.btn-spruce{background:var(--accent);color:var(--on-accent);box-shadow:0 6px 18px rgba(14,140,132,.30)}
  [data-theme="dark"] .btn-amber,[data-theme="dark"] .btn-spruce{box-shadow:0 6px 18px rgba(0,0,0,.35)}
  .btn-amber:active,.btn-spruce:active{background:var(--accent-press)}
  .btn-ghost{background:var(--glass-2);color:var(--ink);border:1px solid var(--glass-brd);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .btn-line{background:var(--glass-2);color:var(--accent);border:1.5px solid var(--accent);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .btn-row{display:flex;gap:9px}.btn-row .btn{flex:1}

  /* instrument gauges (readiness) */
  .ringgrid{display:flex;flex-direction:column;gap:15px;margin-top:6px}
  .gauge{}
  .grow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px}
  .gname{font-size:13.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
  .gval{font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:-.01em}
  .gtrack{height:7px;border-radius:4px;background:var(--track);overflow:hidden}
  .gfill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .gflag{font-family:var(--mono);font-size:8.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--vital-low);
    border:1px solid var(--vital-low);border-radius:4px;padding:1px 5px;opacity:.85}
  .gflag.gnew{color:var(--faint);border-color:var(--faint)}
  .star{color:var(--vital-fade);font-size:9px}

  .list-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 16px;
    background:var(--glass);backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
    border:1px solid var(--glass-brd);border-radius:16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
  .list-row:active{background:var(--glass-2)}
  .list-row .meta{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .chev{color:var(--faint);font-size:18px}

  .pill{display:inline-block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;
    padding:3px 8px;border-radius:20px;background:var(--glass-2);color:var(--muted);margin:0 5px 5px 0}
  .pill-amber{background:var(--accent);color:var(--on-accent)}

  .flash{min-height:188px;display:flex;align-items:center;justify-content:center;text-align:center;
    padding:30px 22px;font-size:18px;line-height:1.45;color:var(--ink)}
  .flash-side{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent)}

  .opt{text-align:left;width:100%;padding:14px 16px;border:1px solid var(--glass-brd);border-radius:14px;
    background:var(--glass-2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--ink);
    margin-bottom:10px;font-size:15px;cursor:pointer;line-height:1.4}
  .opt:active{border-color:var(--accent)}
  .opt.correct{border-color:var(--vital-good);background:var(--good-bg)}
  .opt.wrong{border-color:var(--vital-low);background:var(--bad-bg)}
  .rationale{background:var(--glass-2);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 10px 10px 0;
    font-size:14px;line-height:1.5;margin-top:8px;color:var(--ink)}
  .verdict{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:11px 14px;border-radius:12px;margin:2px 0 4px}
  .verdict svg{width:18px;height:18px;flex:0 0 auto}
  .v-right{background:var(--good-bg);border:1px solid var(--good-line);color:var(--vital-good)}
  .v-wrong{background:var(--bad-bg);border:1px solid var(--bad-line);color:var(--vital-low)}
  .optmark{font-weight:800;margin-left:8px}
  .optmark.ok{color:var(--vital-good)} .optmark.no{color:var(--vital-low)}

  .progress{height:5px;background:var(--track);border-radius:4px;margin-bottom:20px;overflow:hidden}
  .progress > div{height:100%;background:var(--accent);transition:width .3s ease}

  .scene-prompt{font-size:17px;line-height:1.5;margin-bottom:16px;color:var(--ink)}
  .scene-feedback{font-size:14px;line-height:1.5;padding:14px;border-radius:14px;margin:14px 0}
  .fb-good{background:var(--good-bg);border:1px solid var(--good-line);color:var(--ink)}
  .fb-bad{background:var(--bad-bg);border:1px solid var(--bad-line);color:var(--ink)}
  .mode-tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}

  .micro-body{font-size:15px;line-height:1.62;color:var(--ink)}
  .micro-body p{margin:0 0 12px}

  /* floating glass tab bar */
  .nav{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    width:calc(100% - 28px);max-width:492px;background:var(--glass);
    backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);
    border:1px solid var(--glass-brd);border-radius:26px;display:flex;padding:5px;z-index:30;
    box-shadow:0 10px 30px rgba(20,45,65,.18)}
  [data-theme="dark"] .nav{box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .nav button{flex:1;background:none;border:none;padding:8px 0 9px;cursor:pointer;border-radius:20px;
    display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10px;font-weight:600;
    letter-spacing:-.01em}
  .nav button.active{color:var(--accent);background:var(--glass-2)}
  .nav button.active .ndot{opacity:0}
  .ndot{display:none}
  .nav svg{width:23px;height:23px}

  .input{width:100%;padding:13px 14px;border:1px solid var(--glass-brd);border-radius:12px;font-size:16px;
    font-family:var(--sans);background:var(--glass-2);color:var(--ink);margin-bottom:12px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .seg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .seg button{flex:1 1 45%;padding:13px;border:1px solid var(--glass-brd);border-radius:13px;background:var(--glass-2);
    font-size:14px;font-weight:600;cursor:pointer;color:var(--ink);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .seg button.sel{border-color:var(--accent);background:var(--accent);color:var(--on-accent)}
  .label{font-size:13px;font-weight:600;margin:0 0 7px;color:var(--ink)}

  .modal-bg{position:fixed;inset:0;background:rgba(8,16,22,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:var(--glass);backdrop-filter:blur(30px) saturate(1.7);-webkit-backdrop-filter:blur(30px) saturate(1.7);
    width:100%;max-width:520px;border-radius:24px 24px 0 0;border-top:1px solid var(--glass-brd);
    padding:26px 20px calc(26px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto}
  .disclaimer{font-size:13.5px;line-height:1.6;color:var(--ink)}
  .muted{color:var(--muted);font-size:12.5px;line-height:1.55}
  .center{text-align:center}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty svg{width:46px;height:46px;margin-bottom:12px;opacity:.4}
  .search{position:relative}
  .search input{padding-left:38px}
  .search svg{position:absolute;left:12px;top:14px;width:18px;height:18px;color:var(--faint)}
  .track{height:7px;border-radius:4px;background:var(--track);overflow:hidden}
  .fill{height:100%;border-radius:4px}
</style>
</head>

      "id": "m4",
      "domainId": "assessment",
      "title": "Rapid transport and critical interventions",
      "body": "Some patients cannot be helped much at the scene. When the mechanism or your findings put them in the Rapid Transport Category, you do only the critical interventions and move.\n\nThose interventions are tight: open and protect the airway with spine control, support breathing and give oxygen if indicated, start CPR and use an AED if needed, control life-threatening bleeding, and package the patient. Everything else waits. Non-essential treatment at the scene only delays the definitive care that will actually save them."
    },
    {
      "id": "m5",
      "domainId": "assessment",
      "title": "Reading the mechanism of injury",
      "body": "Many serious injuries are not obvious at first. The mechanism, how the energy was applied, tells you where to look. A fall from two metres is a different problem than a fall from ten.\n\nAsk three questions at every scene: what happened, how much energy was involved, and to what part of the body. A high energy mechanism means you actively hunt for hidden injury and lean toward treating and transporting, even when the surface looks unremarkable."
    },
    {
      "id": "m6",
      "domainId": "airway",
      "title": "Airway first, always",
      "body": "A blocked airway kills faster than almost anything else you will face. In an unresponsive patient, open the airway and look, listen and feel for normal breathing. Use a head tilt and chin lift, or a jaw thrust if you suspect a spinal injury.\n\nNoisy breathing is obstructed breathing. Silence in someone who should be breathing is an emergency, not a relief. Be ready to clear the airway and to support breathing with a pocket mask if it is absent or inadequate."
    },
    {
      "id": "m7",
      "domainId": "airway",
      "title": "Choking",
      "body": "If a conscious adult can still cough or speak, encourage them to keep coughing. If they cannot speak, cough or breathe, act at once with back blows and abdominal thrusts until the object clears.\n\nIf they become unresponsive, lower them safely and begin CPR, looking in the mouth and removing any visible object before you give breaths. Do not do blind finger sweeps."
    },
    {
      "id": "m8",
      "domainId": "circulation",
      "title": "Stop the bleed",
      "body": "Life-threatening external bleeding is found and fixed during the primary survey. Apply firm, direct pressure on the wound and keep it there. If you can, have the patient help hold pressure while you stay organised.\n\nIf direct pressure does not control life-threatening bleeding from a limb and you are trained, apply a tourniquet above the wound and note the time. For deep wounds where a tourniquet will not work, pack the wound firmly and maintain pressure."
    },
    {
      "id": "m9",
      "domainId": "circulation",
      "title": "Shock",
      "body": "Shock is the body failing to get enough oxygen to its tissues, often from blood loss. The signs build quietly: pale, cool, clammy skin, a fast weak pulse, fast breathing, and growing anxiety or confusion.\n\nTreat the cause you can see, keep the patient still and warm, reassure them, and arrange transport early. Do not wait for them to look worse. Cold makes shock worse and interferes with clotting, so warmth matters, especially on long evacuations."
    },
    {
      "id": "m10",
      "domainId": "circulation",
      "title": "Cardiac arrest and the AED",
      "body": "If a patient is unresponsive and not breathing normally, they are in cardiac arrest. Start CPR at once and send for the AED. Occasional gasping is not normal breathing.\n\nCompress the centre of the chest 5 to 6 cm deep at 100 to 120 per minute, allowing full recoil, with 30 compressions to 2 breaths. Keep pauses under ten seconds. Put the AED on as soon as it arrives, follow the prompts, and resume compressions immediately after any shock."
    },
    {
      "id": "m11",
      "domainId": "circulation",
      "title": "Chest pain that worries you",
      "body": "Treat new, unexplained chest discomfort in an adult as a possible heart attack until proven otherwise, especially with sweating, nausea, shortness of breath, or pain spreading to the arm, neck or jaw.\n\nKeep the person at rest and calm, loosen tight clothing, and arrange transport without delay. If it is within your scope and they have no contraindication, aspirin may help. If they become unresponsive and are not breathing normally, start CPR and send for the AED."
    },
    {
      "id": "m12",
      "domainId": "spine",
      "title": "Suspect the spine, then prove otherwise",
      "body": "When the mechanism could injure the spine, a fall, a heavy strike, a high energy impact, or any unconscious trauma patient, assume a spinal injury until your assessment lets you set it aside.\n\nManagement is simple to say and hard under pressure: keep the head, neck and trunk aligned and moving together, and prevent any twist or bend. Normal limb movement does not rule out injury. In a remote setting, think one step ahead, because every move to package or carry is a chance to make it worse."
    },
    {
      "id": "m13",
      "domainId": "spine",
      "title": "Head injuries over time",
      "body": "A head injury can look minor and then worsen as bleeding or swelling builds inside the skull. Your most useful tool is repeated level of responsiveness checks. A dropping level is a serious sign.\n\nWatch for repeated vomiting, a severe or growing headache, unequal pupils, seizures, or clear fluid from the nose or ears. Concussion can happen without any loss of consciousness, and anyone with a suspected concussion needs rest and assessment before returning to work or activity."
    },
    {
      "id": "m14",
      "domainId": "trauma",
      "title": "Big trauma, simple priorities",
      "body": "Severe trauma is loud and frightening, but your priorities do not change: scene safety, then airway, breathing and circulation. The drama of an injury is not the same as its danger.\n\nLeave impaled objects in place and stabilise them. Cover open chest and abdominal wounds and move quickly. For an amputation, control bleeding and bring the cooled, wrapped part with the patient. Most major trauma sits in the Rapid Transport Category, because it cannot be stabilised in the field."
    },
    {
      "id": "m15",
      "domainId": "msk",
      "title": "When you cannot tell if it is broken",
      "body": "In the field you often cannot know whether a limb is fractured, dislocated or badly sprained, and you do not need to. If it could be any of these, treat it as the worst case.\n\nSupport and immobilise the injury, including the joints above and below it, in the position found where reasonable. Check circulation and sensation beyond the injury before and after you splint. Do not try to relocate a dislocation in the field."
    },
    {
      "id": "m16",
      "domainId": "softtissue",
      "title": "Small wounds, done right",
      "body": "Most of what you treat is minor: cuts, scrapes, blisters, splinters and small burns. The real risk is infection days later, so clean technique matters more than speed.\n\nProtect yourself with gloves, control bleeding, clean the wound, cover it, and tell the patient what to watch for. Know which small injuries are quietly serious: wounds over joints, deep punctures, bites, and anything to the hand or eye. Far from care, treat infection risk seriously."
    },
    {
      "id": "m17",
      "domainId": "environment",
      "title": "Cold, water and heat",
      "body": "Cold injury is a constant companion on the coast and in the backcountry. Hypothermia makes people clumsy, confused and quiet before it becomes dangerous, so handle a cold, wet patient gently, remove them from the source, insulate from the ground, and warm slowly.\n\nWith any immersion or near drowning, expect breathing problems and cold together, and remember a person can look fine and still deteriorate over hours, so they need EMS assessment. At the other extreme, heat stroke, with confusion and hot skin, is a true emergency: cool aggressively and transport now."
    },
    {
      "id": "m18",
      "domainId": "environment",
      "title": "Burns",
      "body": "For any burn, stop the burning process first, then cool the burn with clean cool running water for about twenty minutes. Do not use ice, and do not apply butter, creams or ointments. Cover loosely with a clean, non-stick dressing.\n\nTreat a burn as serious if it is large or deep, or involves the face, hands, feet, joints or genitals. After any fire or steam, look for airway burns: soot around the mouth or nose, singed hairs, hoarseness or breathing trouble. An airway burn is an emergency."
    },
    {
      "id": "m19",
      "domainId": "medical",
      "title": "Sick, not hurt",
      "body": "Medical emergencies need the same ordered approach as trauma. Get a history early using SAMPLE: what happened, past problems, medications, allergies, and last food and drink.\n\nDiabetic lows, seizures, stroke and severe allergic reactions all reward fast recognition and fast transport. For anaphylaxis, help the patient use their prescribed epinephrine without delay. For stroke, use FAST and note the time symptoms began. Help a person take their own prescribed emergency medication when that is within your scope and their wishes."
    },
    {
      "id": "m20",
      "domainId": "medical",
      "title": "Anaphylaxis",
      "body": "A severe allergic reaction can move fast: trouble breathing, swelling of the face or throat, a spreading rash, and a feeling of collapse. Treat it as the emergency it is.\n\nThe first-line treatment is the patient's own prescribed epinephrine auto injector, used without delay. After it works, keep monitoring and arrange urgent transport, because symptoms can return. An antihistamine is not a substitute for epinephrine in a severe reaction."
    },
    {
      "id": "m21",
      "domainId": "mental",
      "title": "After the call",
      "body": "Serious incidents land on responders too. Stress reactions after a hard call are normal and not a weakness, and they can appear in the days that follow rather than at the scene.\n\nWatch for them in yourself and your crew, talk about it, and use the supports your workplace offers. When you support someone else in distress, stay calm, keep them safe, listen without judgement, and connect them with help. Do not make promises about confidentiality. A first aid attendant who is looked after is one who can keep responding."
    },
    {
      "id": "m22",
      "domainId": "transport",
      "title": "Decide early, move once",
      "body": "At the Advanced level your hardest calls are about movement. Two questions drive them: how sick or injured is this person, and how far away is definitive care.\n\nWhen help is minutes away you usually stabilise and wait. When you are remote you have to plan a route to a place an ambulance or aircraft can reach, and accept that you may be the care provider for a long time. Move a patient as few times as you can, and when you do, move the head, neck and trunk as one unit if a spinal injury is possible. Plan the move before you start it."
    },
    {
      "id": "m23",
      "domainId": "transport",
      "title": "Working with BCEHS and an ETV",
      "body": "Your transport options range from the local ambulance to a company emergency transport vehicle or industrial ambulance, to meeting BCEHS at a prearranged spot, to aircraft. Activate the plan as soon as you suspect the patient needs stretcher transport, and make sure BCEHS is informed.\n\nAt handover, lead with the essentials: number of patients, precise location, and the nature of the injuries, then give your fuller report of what happened, what you found, what you did, and how the patient changed."
    },
    {
      "id": "m24",
      "domainId": "infection",
      "title": "Protect yourself first",
      "body": "You cannot help anyone if you become a casualty. Treat all body fluids as potentially infectious, use gloves and a barrier device for rescue breaths, and clean up properly afterward.\n\nAfter any contact with blood or body fluids, wash thoroughly, disinfect surfaces and equipment, dispose of sharps and contaminated material safely, and report the exposure. This is not about fear, it is about being able to respond to the next call as well as this one."
    },
    {
      "id": "m25",
      "domainId": "infection",
      "title": "Emergency childbirth",
      "body": "Birth is usually a normal process, and your job is mostly to support it calmly and keep mother and baby safe. Signs that birth is imminent include strong, frequent contractions and a strong urge to push.\n\nIf help is far away, support a clean, calm delivery, then keep the baby warm and dry, make sure it is breathing, and keep mother and baby together and warm while you arrange urgent transport. Use gloves and barriers, since there is contact with body fluids."
    },
    {
      "id": "m26",
      "domainId": "assessment",
      "title": "Vital signs and trends",
      "body": "Vital signs turn a snapshot into a story. Breathing rate, pulse, skin colour and temperature, level of responsiveness and pupils together tell you how the patient is doing. A resting adult breathes about 12 to 20 times a minute with a pulse around 60 to 100.\n\nOne reading is a starting point. The power is in the trend: take a baseline, note the time, and repeat. A pulse that climbs while skin turns pale and cool is shock developing in front of you, and it should change your transport decision before the patient looks obviously worse."
    },
    {
      "id": "m27",
      "domainId": "airway",
      "title": "Oxygen and airway tools",
      "body": "When breathing or circulation is impaired, oxygen helps if it is available and within your training. A struggling but conscious patient usually does best sitting upright in the position they find easiest.\n\nIn an unresponsive patient, be ready to suction fluid, blood or vomit, and to support breathing with a pocket mask. An oropharyngeal airway can help hold the airway open if there is no gag reflex and you are trained to size and place it. The goal is always the same: a clear airway and air moving in and out."
    },
    {
      "id": "m28",
      "domainId": "circulation",
      "title": "AEDs in awkward situations",
      "body": "An AED is simple, but real scenes are messy. If the patient is wet or lying on metal, move them and dry the chest before applying pads, because water and metal can carry the shock away from the heart.\n\nRemove a medication patch and wipe the area before placing a pad over it. If you feel the bump of an implanted device, place the pad a few centimetres to the side rather than on top. None of this should delay you for long. Get the pads on, follow the prompts, and keep compressions going."
    },
    {
      "id": "m29",
      "domainId": "circulation",
      "title": "CPR for children and infants",
      "body": "The principles are the same as for adults: push hard and fast, allow full recoil, and minimise pauses. The differences are in size. Compress about one third of the chest depth, roughly 5 cm in a child and 4 cm in an infant, using two thumbs or two fingers for an infant.\n\nA single rescuer uses 30 compressions to 2 breaths. With two rescuers, switch to 15 to 2. As always, get the AED on as soon as it arrives and follow the prompts."
    },
    {
      "id": "m30",
      "domainId": "spine",
      "title": "Moving as a team",
      "body": "A spinal patient is moved by a team, not a hero. The person at the head controls the spine and calls every move, so the whole body turns or lifts together on a clear command.\n\nKeep the head in a neutral position aligned with the body, and avoid any twist or bend. A helmet comes off only if it blocks airway care or assessment, and ideally with two trained rescuers keeping the neck still. The slow, coordinated move is the safe one."
    },
    {
      "id": "m31",
      "domainId": "environment",
      "title": "Cold injury beyond hypothermia",
      "body": "Cold harms the body in stages and in pieces. Frostbite freezes tissue, usually fingers, toes, ears or nose, leaving skin pale, waxy, hard and numb. Protect it, do not rub it, and only rewarm if there is no chance it will refreeze, because refreezing causes more damage than staying cold a while longer.\n\nWind matters as much as temperature, stripping heat from exposed skin fast. On the water and in the mountains, dry clothing, shelter from wind, and insulation from the ground are your simplest and best tools."
    },
    {
      "id": "m32",
      "domainId": "medical",
      "title": "Altered consciousness",
      "body": "A patient who is confused, drowsy or unresponsive is a puzzle, because low blood sugar, stroke, poisoning, head injury, lack of oxygen and many other causes can look similar. You will not always know the cause, and that is fine.\n\nTreat what you see. Protect the airway, place them on their side if unresponsive and breathing, give a fast sugar if you suspect a low and they can swallow, support breathing, and arrange transport. Gather a SAMPLE history from the patient or bystanders to pass on."
    },
    {
      "id": "m33",
      "domainId": "mental",
      "title": "Calming a tense situation",
      "body": "When someone is agitated, your manner is your most useful tool. Stay calm, keep a safe distance, lower your voice, and slow everything down. Listen, acknowledge how they feel, and avoid arguing, because argument adds fuel.\n\nYour priorities are safety for everyone and getting the right help. You are not there to diagnose or to win, only to keep the situation safe and connect the person to support."
    },
    {
      "id": "m34",
      "domainId": "transport",
      "title": "Carries, stretchers and aircraft",
      "body": "Moving a patient safely is its own skill. Secure them fully to the carrying device so they cannot shift, and keep them warm and monitored throughout. On a long carry-out, success comes from teamwork, good footing, planned rest rotations, and steady communication, not from speed alone.\n\nAround aircraft, treat the machine with respect: approach only when signalled, stay low, and keep in the pilot's view from the front. A calm, well-drilled team moves a patient far more safely than a rushed one."
    },
    {
      "id": "m35",
      "domainId": "circulation",
      "title": "High-quality CPR",
      "body": "Survival in cardiac arrest is built on a few things done well. Push on the centre of the chest, the lower half of the breastbone, 5 to 6 cm deep at 100 to 120 per minute, and let the chest fully recoil each time so the heart can refill.\n\nKeep pauses under ten seconds, give 30 compressions to 2 breaths, and get the AED on as soon as it arrives. If it advises no shock, resume compressions at once. With a second rescuer, swap about every two minutes so compressions stay strong."
    },
    {
      "id": "m36",
      "domainId": "circulation",
      "title": "Tourniquets and wound packing",
      "body": "Direct pressure controls most bleeding. When it does not control life-threatening bleeding from a limb and you are trained, a tourniquet placed above the wound is the next step. Note the time it went on and leave it for the medical team. Do not loosen it yourself.\n\nFor deep wounds where a tourniquet cannot be used, such as the groin or armpit, pack the wound firmly with gauze or a hemostatic dressing and hold steady pressure. The aim is the same throughout: stop the bleeding and keep it stopped."
    },
    {
      "id": "m37",
      "domainId": "spine",
      "title": "Spinal precautions in plain terms",
      "body": "The goal is simple: stop movement that could turn a survivable spinal injury into a permanent one. Decide based on the mechanism and your findings, because you cannot clear a spine in the field.\n\nHold the head in a neutral position, keep the body aligned, and move only as a coordinated team on command. For a conscious patient, a quick check of sensation and movement in the fingers and toes, plus questions about numbness, gives useful information to pass on. Keep them calm, because fear and pain make people move."
    },
    {
      "id": "m38",
      "domainId": "trauma",
      "title": "Hidden and delayed trauma",
      "body": "Some of the most dangerous injuries are the ones you cannot see. A crush that is released, a blast, or a high-energy blunt impact can leave little on the surface while serious damage builds inside.\n\nLet the mechanism guide you. Suspect internal injury, watch for shock, and lean toward treating and transporting. Crush syndrome in particular can worsen after the weight comes off, so a patient who was trapped for a long time needs urgent medical care even if they look reasonable at first."
    },
    {
      "id": "m39",
      "domainId": "environment",
      "title": "Water and drowning",
      "body": "Cold water does two things at once: it triggers a gasp and rapid breathing that can cause drowning in the first minute, and it cools the body toward hypothermia. Getting and keeping the airway above water is the immediate priority.\n\nAfter any near drowning, the danger is not over. Water and irritation in the lungs can impair breathing over the following hours, so even a patient who seems fine needs assessment by EMS. Treat the cold and the breathing together, and handle a very cold patient gently."
    },
    {
      "id": "m40",
      "domainId": "medical",
      "title": "Poisoning by any route",
      "body": "A poison can enter the body by being swallowed, inhaled, absorbed through the skin, or injected. Your first job is to recognise it and stay safe, because inhaled and absorbed poisons can harm you too.\n\nIdentify the substance if you can, and contact Poison Control or EMS for advice. For skin contact, remove contaminated clothing, brush off dry chemical, and rinse. For swallowed poison, do not make the patient vomit unless told to. For inhaled gas, get the patient to fresh air only if it is safe for you."
    },
    {
      "id": "m41",
      "domainId": "medical",
      "title": "Recognising stroke fast",
      "body": "A stroke starves part of the brain, and treatment works best within hours, so speed is everything. Use BE-FAST: Balance, Eyes, Face drooping, Arm weakness, Speech trouble, and Time to act.\n\nThe single most useful thing you can do, beyond arranging urgent transport, is to record when the symptoms started, because that time guides hospital treatment. Keep the patient calm, give nothing by mouth, and pass the onset time on at handover."
    },
    {
      "id": "m42",
      "domainId": "mental",
      "title": "Looking after the responders",
      "body": "The people who respond to emergencies carry them afterward. A strong reaction in the hours and days after a hard call is normal, not a weakness, and it usually eases with support.\n\nWatch for it in yourself and your crew. Talk about what happened, rest, and use the supports your workplace offers, including peer support and critical incident stress programs. When you support someone in acute distress, stay calm, keep them safe, listen, and connect them with help rather than trying to fix it yourself."
    },
    {
      "id": "m43",
      "domainId": "infection",
      "title": "Childbirth and the newborn",
      "body": "Most births are normal events that you support rather than manage. Crowning, when the head becomes visible, means birth is very near. Support a clean, calm delivery, and keep the mother in a comfortable position.\n\nAfter birth, dry the baby, keep it warm, and make sure it is breathing. If it is not, dry and stimulate it, keep it warm, and begin newborn resuscitation while help is arranged. Keep mother and baby together and warm, watch the mother for heavy bleeding after the placenta delivers, and arrange transport."
    }
  ],

        "wilderness",

        "marine"
      ]
    },

      "tags": []
    },
    {
      "id": "f9",
      "domainId": "role",

      "tags": [
        "industrial",
        "construction"
      ]
    },
    {
      "id": "f10",
      "domainId": "role",
      "front": "What is the attendant's role once higher care arrives?",

      "tags": []
    },
    {
      "id": "f11",
      "domainId": "assessment",
      "front": "What are the four stages of the Priority Action Approach?",
      "back": "Scene assessment, primary survey with critical interventions, transport decision, then secondary survey.",
      "tags": []
    },
    {
      "id": "f12",
      "domainId": "assessment",
      "front": "What three things do you check during scene assessment?",
      "back": "Hazards, the mechanism of injury, and the number of patients.",
      "tags": [
        "construction",
        "forestry",
        "marine"
      ]
    },
    {
      "id": "f13",
      "domainId": "assessment",
      "front": "What is the order of the primary survey?",
      "back": "Airway with spine control, Breathing, Circulation, while finding and fixing life threats as you go.",
      "tags": []
    },
    {
      "id": "f14",
      "domainId": "assessment",
      "front": "What does the primary survey look for?",
      "back": "Immediate threats to life in the airway, breathing, and circulation.",
      "tags": []
    },
    {
      "id": "f15",
      "domainId": "assessment",
      "front": "What is the Rapid Transport Category?",
      "back": "Patients whose injuries or mechanism mean they need prompt hospital care, with only critical interventions done at the scene.",
      "tags": []
    },
    {
      "id": "f16",
      "domainId": "assessment",
      "front": "Name the critical interventions done before rapid transport.",
      "back": "Open and maintain the airway with spine control, ventilate and give oxygen if indicated, CPR and AED if needed, control life-threatening bleeding, and package for transport.",
      "tags": []
    },
    {
      "id": "f17",
      "domainId": "assessment",
      "front": "Why does mechanism of injury matter?",
      "back": "It predicts hidden serious injury. More energy transferred to the body means a higher chance of major injury.",
      "tags": [
        "forestry",
        "construction",
        "film"
      ]
    },
    {
      "id": "f18",
      "domainId": "assessment",
      "front": "What does AVPU describe?",
      "back": "Level of responsiveness: Alert, responds to Voice, responds to Pain, Unresponsive.",
      "tags": []
    },
    {
      "id": "f19",
      "domainId": "assessment",
      "front": "What does SAMPLE stand for?",
      "back": "Signs and symptoms, Allergies, Medications, Past history, Last food and drink, Events leading up.",
      "tags": []
    },
    {
      "id": "f20",
      "domainId": "assessment",
      "front": "When is the secondary survey done?",
      "back": "After the primary survey is complete and life threats are controlled, and never if it would delay a rapid transport patient.",
      "tags": []
    },
    {
      "id": "f21",
      "domainId": "assessment",
      "front": "What is the secondary survey?",
      "back": "A head to toe examination plus a focused history to find injuries that are not immediately life threatening.",
      "tags": []
    },
    {
      "id": "f22",
      "domainId": "assessment",
      "front": "What is the first action at every scene?",
      "back": "Confirm the scene is safe for you and the patient before making contact.",
      "tags": []
    },
    {
      "id": "f23",
      "domainId": "assessment",
      "front": "Why reassess a patient repeatedly?",
      "back": "Patients change. Repeating checks catches deterioration early, especially level of responsiveness.",
      "tags": []
    },
    {
      "id": "f24",
      "domainId": "assessment",
      "front": "What should you do if you find a life threat during the primary survey?",
      "back": "Treat it immediately, then continue. Do not move on while a life threat is uncontrolled.",
      "tags": []
    },
    {
      "id": "f25",
      "domainId": "assessment",
      "front": "What information must reach BCEHS dispatch through a helper?",
      "back": "Number of patients, the precise location, and the basic nature of the injuries.",
      "tags": [
        "wilderness",
        "marine",
        "forestry"
      ]
    },
    {
      "id": "f26",
      "domainId": "assessment",
      "front": "When should you summon transport?",
      "back": "As soon as you suspect the patient will need stretcher transport. It can be cancelled or downgraded later.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f27",
      "domainId": "airway",
      "front": "What kills faster than almost anything you will face?",
      "back": "A blocked airway. Airway always comes first.",
      "tags": []
    },
    {
      "id": "f28",
      "domainId": "airway",
      "front": "How do you check breathing in an unresponsive patient?",
      "back": "Open the airway, then look, listen and feel for normal breathing for up to ten seconds.",
      "tags": []
    },
    {
      "id": "f29",
      "domainId": "airway",
      "front": "What does noisy breathing tell you?",
      "back": "The airway is partly obstructed. Noise means obstruction until proven otherwise.",
      "tags": []
    },
    {
      "id": "f30",
      "domainId": "airway",
      "front": "How do you open the airway when no spine injury is suspected?",
      "back": "Head tilt with chin lift.",
      "tags": []
    },
    {
      "id": "f31",
      "domainId": "airway",
      "front": "How do you open the airway when a spine injury is suspected?",
      "back": "Jaw thrust, keeping the head and neck still.",
      "tags": []
    },
    {
      "id": "f32",
      "domainId": "airway",
      "front": "What device does an Advanced attendant use to ventilate?",
      "back": "A pocket mask, giving breaths that make the chest rise.",
      "tags": []
    },
    {
      "id": "f33",
      "domainId": "airway",
      "front": "How long should each rescue breath take?",
      "back": "About one second, just enough to see the chest rise.",
      "tags": []
    },
    {
      "id": "f34",
      "domainId": "airway",
      "front": "Conscious adult choking, cannot speak, cough or breathe. What do you do?",
      "back": "Act at once with back blows and abdominal thrusts until it clears or they go unresponsive.",
      "tags": [
        "industrial",
        "film"
      ]
    },
    {
      "id": "f35",
      "domainId": "airway",
      "front": "A choking patient becomes unresponsive. What now?",
      "back": "Lower them safely and begin CPR, checking the mouth for the object before breaths.",
      "tags": []
    },
    {
      "id": "f36",
      "domainId": "airway",
      "front": "What is the recovery position for?",
      "back": "Keeping the airway open and letting fluids drain in an unresponsive patient who is breathing normally.",
      "tags": []
    },
    {
      "id": "f37",
      "domainId": "airway",
      "front": "What are signs of inadequate breathing?",
      "back": "Very fast or very slow rate, shallow effort, blue lips, gasping, or extreme difficulty speaking.",
      "tags": []
    },
    {
      "id": "f38",
      "domainId": "airway",
      "front": "When is oxygen indicated?",
      "back": "When breathing or circulation is compromised and oxygen is available and within your training.",
      "tags": []
    },
    {
      "id": "f39",
      "domainId": "airway",
      "front": "What is the rate of rescue breaths for an adult in respiratory arrest with a pulse?",
      "back": "About one breath every six seconds, roughly ten per minute.",
      "tags": []
    },
    {
      "id": "f40",
      "domainId": "airway",
      "front": "Why is silence dangerous in someone who should be breathing?",
      "back": "It can mean a complete airway obstruction or respiratory arrest, both emergencies.",
      "tags": []
    },
    {
      "id": "f41",
      "domainId": "circulation",
      "front": "How do you first control severe external bleeding?",
      "back": "Firm, direct pressure on the wound, held continuously.",
      "tags": [
        "forestry",
        "marine",
        "construction",
        "wilderness"
      ]
    },
    {
      "id": "f42",
      "domainId": "circulation",
      "front": "What if direct pressure does not control life-threatening limb bleeding?",
      "back": "Apply a tourniquet above the wound if trained and available, and note the time.",
      "tags": [
        "forestry",
        "construction"
      ]
    },
    {
      "id": "f43",
      "domainId": "circulation",
      "front": "What is wound packing used for?",
      "back": "Deep wounds in areas where a tourniquet cannot be used, packing gauze firmly into the wound and holding pressure.",
      "tags": []
    },
    {
      "id": "f44",
      "domainId": "circulation",
      "front": "What is shock?",
      "back": "A failure to deliver enough oxygen to the body tissues, often from blood loss.",
      "tags": []
    },
    {
      "id": "f45",
      "domainId": "circulation",
      "front": "Name common signs of shock.",
      "back": "Pale, cool, clammy skin, fast weak pulse, fast breathing, anxiety or confusion, and weakness.",
      "tags": []
    },
    {
      "id": "f46",
      "domainId": "circulation",
      "front": "General care for shock?",
      "back": "Treat the cause, keep the patient still and warm, reassure them, and arrange transport early.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f47",
      "domainId": "circulation",
      "front": "Why keep a bleeding or shock patient warm?",
      "back": "Cold worsens shock and interferes with clotting.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f48",
      "domainId": "circulation",
      "front": "Cardiac warning signs beyond chest pain?",
      "back": "Sweating, nausea, shortness of breath, and pain spreading to the arm, neck or jaw.",
      "tags": []
    },
    {
      "id": "f49",
      "domainId": "circulation",
      "front": "Care for a conscious patient with suspected cardiac chest pain?",
      "back": "Keep them at rest and calm, loosen tight clothing, and arrange transport without delay.",
      "tags": []
    },
    {
      "id": "f50",
      "domainId": "circulation",
      "front": "When can aspirin help a cardiac patient?",
      "back": "For suspected heart attack in an adult with no allergy or contraindication, if within your scope and the patient agrees.",
      "tags": []
    },
    {
      "id": "f51",
      "domainId": "circulation",
      "front": "Patient is unresponsive and not breathing normally. First steps?",
      "back": "Start CPR and send for the AED at once.",
      "tags": []
    },
    {
      "id": "f52",
      "domainId": "circulation",
      "front": "What is the adult compression rate and depth?",
      "back": "100 to 120 per minute, 5 to 6 cm deep, allowing full recoil between compressions.",
      "tags": []
    },
    {
      "id": "f53",
      "domainId": "circulation",
      "front": "What is the adult compression to breath ratio?",
      "back": "30 compressions to 2 breaths for a single rescuer.",
      "tags": []
    },
    {
      "id": "f54",
      "domainId": "circulation",
      "front": "How long should pauses in compressions be?",
      "back": "As short as possible, under ten seconds.",
      "tags": []
    },
    {
      "id": "f55",
      "domainId": "circulation",
      "front": "When do you use an AED?",
      "back": "As soon as it arrives. Turn it on and follow the voice prompts.",
      "tags": []
    },
    {
      "id": "f56",
      "domainId": "circulation",
      "front": "What do you do right after an AED shock?",
      "back": "Resume compressions immediately, do not pause to check.",
      "tags": []
    },
    {
      "id": "f57",
      "domainId": "circulation",
      "front": "Is gasping the same as breathing?",
      "back": "No. Occasional gasping in an unresponsive patient is not normal breathing. Start CPR.",
      "tags": []
    },
    {
      "id": "f58",
      "domainId": "circulation",
      "front": "What is internal bleeding and why is it dangerous?",
      "back": "Bleeding inside the body you cannot see or compress. It can cause shock with no obvious wound, so suspect it from the mechanism.",
      "tags": [
        "construction",
        "forestry"
      ]
    },
    {
      "id": "f59",
      "domainId": "spine",
      "front": "Which mechanisms make you suspect a spinal injury?",
      "back": "Falls, high energy impacts, strikes to the head or back, and any unconscious trauma patient.",
      "tags": [
        "forestry",
        "construction",
        "film",
        "wilderness"
      ]
    },
    {
      "id": "f60",
      "domainId": "spine",
      "front": "Core principle of moving a suspected spinal patient?",
      "back": "Move the head, neck and trunk as one unit, with no twisting or bending.",
      "tags": []
    },
    {
      "id": "f61",
      "domainId": "spine",
      "front": "What is spinal motion restriction?",
      "back": "Keeping the spine still and aligned, by hand and then with equipment such as a collar and a carrying device.",
      "tags": []
    },
    {
      "id": "f62",
      "domainId": "spine",
      "front": "When is a hard collar applied?",
      "back": "When a cervical spine injury is suspected, as part of restricting spinal motion before transport.",
      "tags": []
    },
    {
      "id": "f63",
      "domainId": "spine",
      "front": "What is the fastest field check of a head injured patient over time?",
      "back": "Repeated level of responsiveness checks. A dropping level is a serious sign.",
      "tags": []
    },
    {
      "id": "f64",
      "domainId": "spine",
      "front": "Warning signs after a head injury?",
      "back": "Worsening responsiveness, repeated vomiting, severe or growing headache, unequal pupils, seizures, or clear fluid from the nose or ears.",
      "tags": []
    },
    {
      "id": "f65",
      "domainId": "spine",
      "front": "What is a concussion?",
      "back": "A brain injury from a blow or jolt that disturbs brain function, even without loss of consciousness.",
      "tags": [
        "film",
        "wilderness"
      ]
    },
    {
      "id": "f66",
      "domainId": "spine",
      "front": "Should someone with a suspected concussion return to work or activity?",
      "back": "No. They need rest and medical assessment before returning.",
      "tags": [
        "film"
      ]
    },
    {
      "id": "f67",
      "domainId": "spine",
      "front": "Signs that suggest a spinal cord injury?",
      "back": "Numbness, tingling, weakness, or loss of movement in the limbs, or loss of bladder or bowel control.",
      "tags": []
    },
    {
      "id": "f68",
      "domainId": "spine",
      "front": "How do you hold a head still for a suspected spinal injury?",
      "back": "Manual in-line stabilisation, holding the head in a neutral position aligned with the body.",
      "tags": []
    },
    {
      "id": "f69",
      "domainId": "spine",
      "front": "Why keep monitoring an unconscious head injured patient's airway?",
      "back": "They cannot protect their own airway and may vomit. Be ready to clear it while protecting the spine.",
      "tags": []
    },
    {
      "id": "f70",
      "domainId": "spine",
      "front": "Can a patient have a serious spinal injury and still move their limbs?",
      "back": "Yes. Normal movement does not rule out a spinal injury. Judge by mechanism and findings.",
      "tags": []
    },
    {
      "id": "f71",
      "domainId": "spine",
      "front": "What position do you keep a suspected spinal patient in?",
      "back": "Still and aligned in a neutral position, supported until they can be properly secured.",
      "tags": []
    },
    {
      "id": "f72",
      "domainId": "spine",
      "front": "Why is rough handling so dangerous with spinal injuries?",
      "back": "Every uncontrolled movement can worsen the cord injury and cause permanent damage.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f73",
      "domainId": "trauma",
      "front": "How do you manage an impaled object?",
      "back": "Leave it in place and stabilise it with bulky dressings. Do not remove it in the field.",
      "tags": [
        "forestry",
        "marine",
        "construction"
      ]
    },
    {
      "id": "f74",
      "domainId": "trauma",
      "front": "Priorities in a severe trauma patient?",
      "back": "Scene safety, then airway, breathing and circulation. Do not be pulled away by dramatic but non-lethal injuries.",
      "tags": []
    },
    {
      "id": "f75",
      "domainId": "trauma",
      "front": "How do you manage an open chest wound?",
      "back": "Cover it and watch breathing closely, and move the patient quickly to definitive care.",
      "tags": []
    },
    {
      "id": "f76",
      "domainId": "trauma",
      "front": "How do you manage exposed abdominal organs?",
      "back": "Do not push them back in. Cover with a moist, clean dressing and arrange rapid transport.",
      "tags": []
    },
    {
      "id": "f77",
      "domainId": "trauma",
      "front": "What is an amputation and how do you care for the part?",
      "back": "Loss of a body part. Control bleeding, then wrap the part, keep it cool, and send it with the patient.",
      "tags": [
        "forestry",
        "industrial"
      ]
    },
    {
      "id": "f78",
      "domainId": "trauma",
      "front": "Why does major trauma usually fall in the Rapid Transport Category?",
      "back": "Major trauma cannot be stabilised in the field. Only critical interventions help before hospital.",
      "tags": []
    },
    {
      "id": "f79",
      "domainId": "trauma",
      "front": "What is a flail chest?",
      "back": "A section of ribs broken in several places that moves opposite to the rest of the chest, impairing breathing.",
      "tags": []
    },
    {
      "id": "f80",
      "domainId": "trauma",
      "front": "What is the main risk with crush injuries?",
      "back": "Serious internal damage and shock, sometimes with little external sign.",
      "tags": [
        "industrial",
        "construction"
      ]
    },
    {
      "id": "f81",
      "domainId": "trauma",
      "front": "Why suspect hidden injury after a high speed impact?",
      "back": "Energy transfers deep into the body. Serious internal injury can exist with little surface damage.",
      "tags": [
        "construction",
        "forestry"
      ]
    },
    {
      "id": "f82",
      "domainId": "trauma",
      "front": "How do you control bleeding from a scalp wound?",
      "back": "Direct pressure, while keeping the spine in mind if the mechanism suggests a head or neck injury.",
      "tags": []
    },
    {
      "id": "f83",
      "domainId": "trauma",
      "front": "What do you do for a penetrating eye injury?",
      "back": "Do not press on the eye or remove anything. Protect both eyes and arrange urgent transport.",
      "tags": []
    },
    {
      "id": "f84",
      "domainId": "trauma",
      "front": "Care for a knocked out tooth?",
      "back": "Handle it by the crown, keep it moist in milk or the patient's saliva, and seek dental care quickly.",
      "tags": []
    },
    {
      "id": "f85",
      "domainId": "trauma",
      "front": "What is the danger of facial injuries?",
      "back": "They can compromise the airway with blood, swelling or broken structures. Watch the airway closely.",
      "tags": []
    },
    {
      "id": "f86",
      "domainId": "trauma",
      "front": "How do you treat a nosebleed?",
      "back": "Sit the patient leaning slightly forward and pinch the soft part of the nose firmly for several minutes.",
      "tags": []
    },
    {
      "id": "f87",
      "domainId": "msk",
      "front": "If you cannot tell whether a limb is broken or sprained?",
      "back": "Treat it as the worst case and immobilise it.",
      "tags": []
    },
    {
      "id": "f88",
      "domainId": "msk",
      "front": "What must you check before and after splinting?",
      "back": "Circulation and sensation beyond the injury.",
      "tags": [
        "wilderness",
        "forestry"
      ]
    },
    {
      "id": "f89",
      "domainId": "msk",
      "front": "What is the general principle for immobilising an injured limb?",
      "back": "Support it in the position found where reasonable, and immobilise the joints above and below the injury.",
      "tags": []
    },
    {
      "id": "f90",
      "domainId": "msk",
      "front": "Signs of a possible fracture?",
      "back": "Pain, swelling, deformity, inability to use the part, and sometimes a grinding feeling.",
      "tags": []
    },
    {
      "id": "f91",
      "domainId": "msk",
      "front": "What is a dislocation?",
      "back": "A joint forced out of its normal position. Do not try to put it back in the field.",
      "tags": []
    },
    {
      "id": "f92",
      "domainId": "msk",
      "front": "How do you care for a suspected pelvic fracture?",
      "back": "Handle very gently, avoid movement, treat for shock, and arrange rapid transport.",
      "tags": [
        "construction",
        "industrial"
      ]
    },
    {
      "id": "f93",
      "domainId": "msk",
      "front": "Why not straighten a badly deformed fracture in the field?",
      "back": "Movement can worsen damage and pain, unless circulation beyond the injury is lost and you are trained to act.",
      "tags": []
    },
    {
      "id": "f94",
      "domainId": "msk",
      "front": "What is the risk with an open fracture?",
      "back": "Bleeding and infection. Control bleeding, cover the wound, and immobilise.",
      "tags": []
    },
    {
      "id": "f95",
      "domainId": "msk",
      "front": "Care for a suspected broken arm?",
      "back": "Immobilise it, support it against the body, check circulation and sensation, and arrange care.",
      "tags": []
    },
    {
      "id": "f96",
      "domainId": "msk",
      "front": "What is RICE used for?",
      "back": "Minor sprains and strains: Rest, Ice, Compression, Elevation.",
      "tags": []
    },
    {
      "id": "f97",
      "domainId": "msk",
      "front": "Why immobilise the joints above and below a fracture?",
      "back": "To stop movement at the broken bone and reduce further injury and pain.",
      "tags": []
    },
    {
      "id": "f98",
      "domainId": "msk",
      "front": "When does a limb injury become urgent?",
      "back": "When there is no circulation or sensation beyond it, heavy bleeding, or an open wound.",
      "tags": []
    },
    {
      "id": "f99",
      "domainId": "softtissue",
      "front": "What is the real risk of a minor wound days later?",
      "back": "Infection. Clean it well, cover it, and tell the patient the warning signs.",
      "tags": []
    },
    {
      "id": "f100",
      "domainId": "softtissue",
      "front": "Basic care for a minor wound?",
      "back": "Control bleeding, clean the wound, cover it, and advise on follow up.",
      "tags": []
    },
    {
      "id": "f101",
      "domainId": "softtissue",
      "front": "Which small wounds are quietly serious?",
      "back": "Wounds over joints, deep punctures, animal or human bites, and anything to the hand or eye.",
      "tags": []
    },
    {
      "id": "f102",
      "domainId": "softtissue",
      "front": "Signs a wound is becoming infected?",
      "back": "Increasing pain, redness spreading out, swelling, heat, pus, or fever.",
      "tags": []
    },
    {
      "id": "f103",
      "domainId": "softtissue",
      "front": "How do you care for a blister from friction?",
      "back": "Keep it clean and protected. Leave it intact if possible.",
      "tags": []
    },
    {
      "id": "f104",
      "domainId": "softtissue",
      "front": "What is occupational dermatitis?",
      "back": "Skin inflammation from contact with irritants or allergens at work, common in wet or chemical jobs.",
      "tags": [
        "industrial",
        "marine"
      ]
    },
    {
      "id": "f105",
      "domainId": "softtissue",
      "front": "How do you remove a small splinter?",
      "back": "Clean the area, ease it out along the entry angle with clean tweezers, then clean and cover.",
      "tags": []
    },
    {
      "id": "f106",
      "domainId": "softtissue",
      "front": "When should a wound be seen by a clinician?",
      "back": "Deep or gaping wounds, wounds that will not stop bleeding, possible foreign material, or high infection risk.",
      "tags": []
    },
    {
      "id": "f107",
      "domainId": "softtissue",
      "front": "Why is wound cleaning so important offshore or in the bush?",
      "back": "Infection that develops days later is the real danger when help is far away.",
      "tags": [
        "marine",
        "wilderness",
        "forestry"
      ]
    },
    {
      "id": "f108",
      "domainId": "softtissue",
      "front": "What should you do before giving wound care?",
      "back": "Protect yourself with gloves and treat all body fluids as infectious.",
      "tags": []
    },
    {
      "id": "f109",
      "domainId": "environment",
      "front": "Early signs of hypothermia?",
      "back": "Shivering, clumsiness, slow thinking, and withdrawal. The patient may not realise how cold they are.",
      "tags": [
        "marine",
        "wilderness"
      ]
    },
    {
      "id": "f110",
      "domainId": "environment",
      "front": "How do you handle a cold, wet patient?",
      "back": "Gently. Remove them from the cold, take off wet clothing, insulate from the ground, and warm slowly.",
      "tags": [
        "marine",
        "wilderness"
      ]
    },
    {
      "id": "f111",
      "domainId": "environment",
      "front": "Why handle a severely hypothermic patient gently?",
      "back": "A very cold heart is prone to dangerous rhythms, and rough handling can trigger them.",
      "tags": [
        "marine",
        "wilderness"
      ]
    },
    {
      "id": "f112",
      "domainId": "environment",
      "front": "Why does a near drowning patient need EMS even if they seem fine?",
      "back": "Breathing problems can develop over the following hours.",
      "tags": [
        "marine",
        "wilderness"
      ]
    },
    {
      "id": "f113",
      "domainId": "environment",
      "front": "First step for any burn?",
      "back": "Stop the burning process, then cool the burn.",
      "tags": []
    },
    {
      "id": "f114",
      "domainId": "environment",
      "front": "How do you cool a burn?",
      "back": "With clean cool running water for about twenty minutes. Do not use ice.",
      "tags": [
        "industrial",
        "film"
      ]
    },
    {
      "id": "f115",
      "domainId": "environment",
      "front": "What do you not put on a burn?",
      "back": "Ice, butter, creams or ointments. Cover loosely with a clean, non-stick dressing.",
      "tags": []
    },
    {
      "id": "f116",
      "domainId": "environment",
      "front": "When is a burn serious?",
      "back": "Large area, deep, or to the face, hands, feet, joints or genitals, or any airway burn.",
      "tags": []
    },
    {
      "id": "f117",
      "domainId": "environment",
      "front": "Signs of an airway burn?",
      "back": "Soot around the mouth or nose, singed hairs, hoarseness, or breathing trouble after a fire or steam.",
      "tags": [
        "industrial",
        "film"
      ]
    },
    {
      "id": "f118",
      "domainId": "environment",
      "front": "Care for an electrical injury?",
      "back": "Ensure the power is off and the scene safe first, then check for cardiac and breathing problems and hidden burns.",
      "tags": [
        "industrial",
        "construction",
        "film"
      ]
    },
    {
      "id": "f119",
      "domainId": "environment",
      "front": "Signs of heat exhaustion?",
      "back": "Heavy sweating, weakness, nausea, headache, and cool clammy skin. Move to shade, cool, and give fluids if alert.",
      "tags": []
    },
    {
      "id": "f120",
      "domainId": "environment",
      "front": "Signs of heat stroke and why it is an emergency?",
      "back": "Hot skin, confusion or collapse, and a high temperature. It is life threatening. Cool aggressively and transport now.",
      "tags": []
    },
    {
      "id": "f121",
      "domainId": "environment",
      "front": "General care for a snake or venomous bite?",
      "back": "Keep the patient calm and still, immobilise the part, and arrange urgent transport. Do not cut or suck the wound.",
      "tags": [
        "wilderness",
        "forestry"
      ]
    },
    {
      "id": "f122",
      "domainId": "environment",
      "front": "First aid for a chemical splash to the eye?",
      "back": "Flush with clean water for a prolonged period and arrange medical care.",
      "tags": [
        "industrial"
      ]
    },
    {
      "id": "f123",
      "domainId": "environment",
      "front": "Care for a diving emergency such as decompression illness?",
      "back": "Keep the patient lying still, give oxygen if trained, and arrange urgent transport, mentioning the dive.",
      "tags": [
        "marine"
      ]
    },
    {
      "id": "f124",
      "domainId": "environment",
      "front": "Why is alcohol a bad idea for a cold patient?",
      "back": "It feels warming but increases heat loss and worsens hypothermia.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f125",
      "domainId": "medical",
      "front": "What simple history frame helps in a medical emergency?",
      "back": "SAMPLE: what happened, past problems, medications, allergies, last food and drink.",
      "tags": []
    },
    {
      "id": "f126",
      "domainId": "medical",
      "front": "Signs of a severe allergic reaction?",
      "back": "Trouble breathing, swelling of the face or throat, widespread rash, and feeling faint. Treat as an emergency.",
      "tags": [
        "film",
        "wilderness"
      ]
    },
    {
      "id": "f127",
      "domainId": "medical",
      "front": "First-line treatment for anaphylaxis?",
      "back": "The patient's prescribed epinephrine auto injector, used without delay, then urgent transport.",
      "tags": [
        "film",
        "wilderness"
      ]
    },
    {
      "id": "f128",
      "domainId": "medical",
      "front": "Why monitor after an epinephrine injection?",
      "back": "Symptoms can return, so the patient still needs monitoring and transport to definitive care.",
      "tags": []
    },
    {
      "id": "f129",
      "domainId": "medical",
      "front": "A known diabetic is confused and sweaty. Likely problem?",
      "back": "Possible low blood sugar. If responsive and able to swallow, give sugar.",
      "tags": []
    },
    {
      "id": "f130",
      "domainId": "medical",
      "front": "What do you give for a suspected low blood sugar in an alert patient?",
      "back": "A fast sugar such as juice or glucose, then monitor.",
      "tags": []
    },
    {
      "id": "f131",
      "domainId": "medical",
      "front": "How do you recognise a stroke?",
      "back": "Face drooping, Arm weakness, Speech trouble, Time to call for help. Note when symptoms started.",
      "tags": []
    },
    {
      "id": "f132",
      "domainId": "medical",
      "front": "Why does timing matter so much in stroke?",
      "back": "Treatments work best within hours, so record the time symptoms began and transport urgently.",
      "tags": []
    },
    {
      "id": "f133",
      "domainId": "medical",
      "front": "What do you do during a seizure?",
      "back": "Protect the person from injury, do not restrain them or put anything in their mouth, and time it.",
      "tags": []
    },
    {
      "id": "f134",
      "domainId": "medical",
      "front": "After a seizure ends, what care is needed?",
      "back": "Place them on their side, keep the airway clear, reassure them, and monitor as they recover.",
      "tags": []
    },
    {
      "id": "f135",
      "domainId": "medical",
      "front": "Care for a patient with breathing difficulty and a known inhaler?",
      "back": "Help them sit up and use their own prescribed inhaler, and arrange care if it does not improve.",
      "tags": []
    },
    {
      "id": "f136",
      "domainId": "medical",
      "front": "What is the danger of an asthma attack?",
      "back": "Severe attacks can stop breathing. Help with the inhaler and get help if it is not improving.",
      "tags": []
    },
    {
      "id": "f137",
      "domainId": "medical",
      "front": "Signs of poisoning?",
      "back": "Depend on the poison: nausea, vomiting, confusion, burns around the mouth, or trouble breathing. Identify the substance.",
      "tags": [
        "industrial"
      ]
    },
    {
      "id": "f138",
      "domainId": "medical",
      "front": "First steps for swallowed poison?",
      "back": "Identify the substance, call Poison Control or EMS, and follow their advice. Do not make the patient vomit unless told to.",
      "tags": [
        "industrial"
      ]
    },
    {
      "id": "f139",
      "domainId": "medical",
      "front": "Care for inhaled toxic gas?",
      "back": "Get the patient to fresh air only if it is safe for you, give oxygen if trained, and arrange transport.",
      "tags": [
        "industrial",
        "marine"
      ]
    },
    {
      "id": "f140",
      "domainId": "medical",
      "front": "What should you suspect with sudden severe chest pain and breathlessness?",
      "back": "A serious cardiac or lung problem. Keep them at rest and arrange urgent transport.",
      "tags": []
    },
    {
      "id": "f141",
      "domainId": "mental",
      "front": "Are stress reactions after a serious call normal?",
      "back": "Yes. They are a normal response, not a weakness. Talk about it and use available support.",
      "tags": []
    },
    {
      "id": "f142",
      "domainId": "mental",
      "front": "What is critical incident stress?",
      "back": "The strong reaction responders can have after a distressing event, sometimes appearing days later.",
      "tags": []
    },
    {
      "id": "f143",
      "domainId": "mental",
      "front": "How do you support someone in acute distress?",
      "back": "Stay calm, keep them safe, listen without judgement, and connect them with help.",
      "tags": []
    },
    {
      "id": "f144",
      "domainId": "mental",
      "front": "What is your priority with an agitated or distressed patient?",
      "back": "Safety for everyone, a calm approach, and getting appropriate help.",
      "tags": [
        "industrial",
        "construction"
      ]
    },
    {
      "id": "f145",
      "domainId": "mental",
      "front": "Why look after yourself after a hard call?",
      "back": "An attendant who is supported can keep responding. Stress that is ignored can build up.",
      "tags": []
    },
    {
      "id": "f146",
      "domainId": "mental",
      "front": "How do you talk to someone who may be suicidal?",
      "back": "Take it seriously, stay with them, listen, do not leave them alone, and get professional help.",
      "tags": []
    },
    {
      "id": "f147",
      "domainId": "mental",
      "front": "What helps a crew recover after a traumatic incident?",
      "back": "Talking together, normalising the reaction, rest, and access to professional support.",
      "tags": []
    },
    {
      "id": "f148",
      "domainId": "mental",
      "front": "Should you promise confidentiality in a mental health crisis?",
      "back": "No. Do not make promises about who will be involved. Focus on safety and getting help.",
      "tags": []
    },
    {
      "id": "f149",
      "domainId": "transport",
      "front": "Two questions that drive every transport decision?",
      "back": "How sick or injured is the patient, and how far is definitive care.",
      "tags": [
        "wilderness",
        "marine",
        "forestry",
        "film"
      ]
    },
    {
      "id": "f150",
      "domainId": "transport",
      "front": "What is a 'less accessible' workplace?",
      "back": "A site an ambulance cannot reach by land, so you must move the patient to a point EMS can reach.",
      "tags": [
        "wilderness",
        "marine",
        "forestry"
      ]
    },
    {
      "id": "f151",
      "domainId": "transport",
      "front": "How many times should you move a patient?",
      "back": "As few as possible, and plan the move before you start it.",
      "tags": []
    },
    {
      "id": "f152",
      "domainId": "transport",
      "front": "What is an ETV?",
      "back": "An emergency transport vehicle or industrial ambulance used to move a patient toward definitive care.",
      "tags": [
        "industrial",
        "forestry"
      ]
    },
    {
      "id": "f153",
      "domainId": "transport",
      "front": "What is BCEHS?",
      "back": "British Columbia Emergency Health Services, the provincial ambulance and paramedic service.",
      "tags": []
    },
    {
      "id": "f154",
      "domainId": "transport",
      "front": "What is packaging?",
      "back": "Securing and protecting the patient on a carrying device so they can be moved safely.",
      "tags": []
    },
    {
      "id": "f155",
      "domainId": "transport",
      "front": "Why activate transport early?",
      "back": "It saves time. Transport can be cancelled or downgraded, but lost time cannot be recovered.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f156",
      "domainId": "transport",
      "front": "What must you tell BCEHS at handover?",
      "back": "What happened, what you found, what you did, and how the patient changed. Number, location, and nature first.",
      "tags": []
    },
    {
      "id": "f157",
      "domainId": "transport",
      "front": "What goes into a transport plan in a remote setting?",
      "back": "A route to a point EMS can reach, the transport method, communication, and care during the move.",
      "tags": [
        "wilderness",
        "marine",
        "forestry"
      ]
    },
    {
      "id": "f158",
      "domainId": "transport",
      "front": "How do you move a suspected spinal patient onto a stretcher?",
      "back": "As a coordinated team, keeping the spine aligned, using a log roll or lift on command.",
      "tags": []
    },
    {
      "id": "f159",
      "domainId": "transport",
      "front": "What is the goal of all transport decisions?",
      "back": "Get the patient to the right level of care as safely and quickly as the situation allows.",
      "tags": []
    },
    {
      "id": "f160",
      "domainId": "transport",
      "front": "Why keep the patient warm during transport?",
      "back": "Cold worsens shock and slows recovery, especially on long evacuations.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f161",
      "domainId": "infection",
      "front": "How should you treat all body fluids?",
      "back": "As potentially infectious. Use gloves and a barrier device, and clean up properly.",
      "tags": []
    },
    {
      "id": "f162",
      "domainId": "infection",
      "front": "Why is self protection part of good first aid?",
      "back": "You cannot help the next patient if you become a casualty or fall ill.",
      "tags": []
    },
    {
      "id": "f163",
      "domainId": "infection",
      "front": "What is a barrier device used for?",
      "back": "Giving rescue breaths without direct contact, reducing infection risk.",
      "tags": []
    },
    {
      "id": "f164",
      "domainId": "infection",
      "front": "What do you do after contact with blood or body fluids?",
      "back": "Wash thoroughly, clean and disinfect surfaces and equipment, and report any exposure.",
      "tags": []
    },
    {
      "id": "f165",
      "domainId": "infection",
      "front": "How do you reduce infection risk when treating wounds?",
      "back": "Clean hands, gloves, clean dressings, and avoid touching the wound surface.",
      "tags": []
    },
    {
      "id": "f166",
      "domainId": "infection",
      "front": "What are signs that labour is advanced?",
      "back": "Strong, close contractions and a feeling of needing to push or that birth is imminent.",
      "tags": []
    },
    {
      "id": "f167",
      "domainId": "infection",
      "front": "If birth is imminent and help is far, what is your role?",
      "back": "Support a clean, calm delivery, keep mother and baby warm, and arrange urgent transport.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f168",
      "domainId": "infection",
      "front": "After a baby is born, what are the priorities?",
      "back": "Keep the baby warm and dry, ensure it is breathing, and keep mother and baby together and warm.",
      "tags": []
    },
    {
      "id": "f169",
      "domainId": "infection",
      "front": "How do you reduce exposure risk during childbirth?",
      "back": "Use gloves and barriers, as there is contact with body fluids.",
      "tags": []
    },
    {
      "id": "f170",
      "domainId": "infection",
      "front": "Why dispose of sharps and contaminated material carefully?",
      "back": "To protect yourself and others from injury and infection.",
      "tags": []
    },
    {
      "id": "f171",
      "domainId": "assessment",
      "front": "What is a normal adult resting breathing rate?",
      "back": "About 12 to 20 breaths per minute.",
      "tags": []
    },
    {
      "id": "f172",
      "domainId": "assessment",
      "front": "What is a normal adult resting pulse rate?",
      "back": "About 60 to 100 beats per minute.",
      "tags": []
    },
    {
      "id": "f173",
      "domainId": "assessment",
      "front": "What does skin tell you in assessment?",
      "back": "Colour, temperature and moisture hint at circulation and shock. Pale, cool, clammy skin suggests shock.",
      "tags": []
    },
    {
      "id": "f174",
      "domainId": "assessment",
      "front": "What does OPQRST help you assess?",
      "back": "Pain: Onset, Provocation, Quality, Region and radiation, Severity, Time.",
      "tags": []
    },
    {
      "id": "f175",
      "domainId": "assessment",
      "front": "What do the pupils tell you?",
      "back": "Size, equality and reaction to light can signal head injury, drugs or low oxygen.",
      "tags": []
    },
    {
      "id": "f176",
      "domainId": "assessment",
      "front": "How often do you reassess a serious patient?",
      "back": "Frequently, every few minutes, watching especially for a change in level of responsiveness.",
      "tags": []
    },
    {
      "id": "f177",
      "domainId": "assessment",
      "front": "What is a baseline set of vital signs for?",
      "back": "A first reading to compare against, so you can see if the patient is improving or worsening.",
      "tags": []
    },
    {
      "id": "f178",
      "domainId": "assessment",
