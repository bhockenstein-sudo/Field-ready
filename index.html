      "front": "Why note the time of each vital sign set?",
      "back": "Trends over time matter more than a single reading and guide the transport decision.",
      "tags": []
    },
    {
      "id": "f179",
      "domainId": "assessment",
      "front": "What is a focused history?",
      "back": "Questions aimed at the specific complaint and relevant background, gathered using SAMPLE.",
      "tags": []
    },
    {
      "id": "f180",
      "domainId": "assessment",
      "front": "What should you do before touching a trauma patient?",
      "back": "Form a general impression and read the mechanism while keeping the spine in mind.",
      "tags": []
    },
    {
      "id": "f181",
      "domainId": "airway",
      "front": "Why give oxygen to a struggling patient?",
      "back": "It raises the oxygen reaching the tissues when breathing or circulation is impaired.",
      "tags": []
    },
    {
      "id": "f182",
      "domainId": "airway",
      "front": "When is suction used?",
      "back": "To clear fluid, blood or vomit from the airway so the patient can breathe or be ventilated.",
      "tags": []
    },
    {
      "id": "f183",
      "domainId": "airway",
      "front": "What is an oropharyngeal airway used for?",
      "back": "To help keep the airway open in an unresponsive patient with no gag reflex, if trained.",
      "tags": []
    },
    {
      "id": "f184",
      "domainId": "airway",
      "front": "Why must you size an airway adjunct correctly?",
      "back": "The wrong size can push the tongue back or fail to hold the airway open.",
      "tags": []
    },
    {
      "id": "f185",
      "domainId": "airway",
      "front": "Best position for a conscious patient in respiratory distress?",
      "back": "Usually sitting upright, in the position they find easiest to breathe.",
      "tags": []
    },
    {
      "id": "f186",
      "domainId": "airway",
      "front": "What is agonal breathing?",
      "back": "Occasional irregular gasps in a patient in cardiac arrest. It is not normal breathing.",
      "tags": []
    },
    {
      "id": "f187",
      "domainId": "airway",
      "front": "How do you confirm rescue breaths are working?",
      "back": "The chest rises with each breath. If not, reposition the airway and check the seal.",
      "tags": []
    },
    {
      "id": "f188",
      "domainId": "airway",
      "front": "Why avoid over-ventilating?",
      "back": "Too much air or too fast a rate raises chest pressure and reduces blood flow during CPR.",
      "tags": []
    },
    {
      "id": "f189",
      "domainId": "circulation",
      "front": "AED and a wet patient: what first?",
      "back": "Move the patient off metal or out of water and dry the chest before applying pads.",
      "tags": [
        "marine"
      ]
    },
    {
      "id": "f190",
      "domainId": "circulation",
      "front": "AED and a medication patch on the chest?",
      "back": "Remove the patch and wipe the area before placing a pad over it.",
      "tags": []
    },
    {
      "id": "f191",
      "domainId": "circulation",
      "front": "AED and an implanted pacemaker bump?",
      "back": "Place the pad a few centimetres to the side of the bump, not directly over it.",
      "tags": []
    },
    {
      "id": "f192",
      "domainId": "circulation",
      "front": "Two-rescuer adult CPR: what changes?",
      "back": "Swap roles every two minutes to keep compressions strong, and minimise pauses.",
      "tags": []
    },
    {
      "id": "f193",
      "domainId": "circulation",
      "front": "Child compression depth?",
      "back": "About one third the depth of the chest, roughly 5 cm.",
      "tags": []
    },
    {
      "id": "f194",
      "domainId": "circulation",
      "front": "Infant compression depth and technique?",
      "back": "About one third the chest depth, roughly 4 cm, using two thumbs or two fingers.",
      "tags": []
    },
    {
      "id": "f195",
      "domainId": "circulation",
      "front": "Two-rescuer ratio for a child or infant?",
      "back": "15 compressions to 2 breaths.",
      "tags": []
    },
    {
      "id": "f196",
      "domainId": "circulation",
      "front": "What is fainting and the basic care?",
      "back": "A brief loss of consciousness from reduced blood flow to the brain. Lay them down, raise the legs, and check for injury.",
      "tags": []
    },
    {
      "id": "f197",
      "domainId": "circulation",
      "front": "Why reassess after a faint?",
      "back": "To rule out a more serious cause and to catch a slow recovery or repeat episode.",
      "tags": []
    },
    {
      "id": "f198",
      "domainId": "circulation",
      "front": "Where do you check a pulse in an adult?",
      "back": "At the neck (carotid) or wrist (radial).",
      "tags": []
    },
    {
      "id": "f199",
      "domainId": "spine",
      "front": "Who calls the move during a log roll?",
      "back": "The person controlling the head, so the whole body turns together on command.",
      "tags": []
    },
    {
      "id": "f200",
      "domainId": "spine",
      "front": "When do you remove a helmet?",
      "back": "Only if it blocks airway care or assessment, and ideally with two trained rescuers keeping the spine aligned.",
      "tags": [
        "film"
      ]
    },
    {
      "id": "f201",
      "domainId": "spine",
      "front": "Why are ground-level falls risky for older workers?",
      "back": "Even a low fall can cause serious head or spine injury in someone older or on blood thinners.",
      "tags": []
    },
    {
      "id": "f202",
      "domainId": "spine",
      "front": "What is a neutral head position?",
      "back": "The head aligned with the body, eyes facing forward, not flexed or extended.",
      "tags": []
    },
    {
      "id": "f203",
      "domainId": "spine",
      "front": "Why not rush a spinal patient onto a board?",
      "back": "Hasty moves cause twisting. Coordinate the team and move on command.",
      "tags": []
    },
    {
      "id": "f204",
      "domainId": "trauma",
      "front": "Signs of a serious chest injury?",
      "back": "Difficulty breathing, pain on breathing, uneven chest movement, or coughing blood.",
      "tags": []
    },
    {
      "id": "f205",
      "domainId": "trauma",
      "front": "Care for a sucking chest wound?",
      "back": "Cover it and watch breathing closely, and arrange rapid transport.",
      "tags": []
    },
    {
      "id": "f206",
      "domainId": "trauma",
      "front": "What is the danger of a neck wound?",
      "back": "Major bleeding and airway risk. Apply careful direct pressure without cutting off both sides of circulation.",
      "tags": []
    },
    {
      "id": "f207",
      "domainId": "trauma",
      "front": "Foreign object in the eye that is loose on the surface?",
      "back": "Try gentle flushing with clean water. Do not rub or press.",
      "tags": []
    },
    {
      "id": "f208",
      "domainId": "trauma",
      "front": "Foreign object stuck in the eye?",
      "back": "Do not remove it. Protect both eyes and arrange urgent care.",
      "tags": []
    },
    {
      "id": "f209",
      "domainId": "trauma",
      "front": "Care for a torn or partly detached ear?",
      "back": "Control bleeding gently, cover with a clean dressing, and seek care.",
      "tags": []
    },
    {
      "id": "f210",
      "domainId": "trauma",
      "front": "Why cover both eyes for a serious eye injury?",
      "back": "The eyes move together, so covering both reduces movement of the injured one.",
      "tags": []
    },
    {
      "id": "f211",
      "domainId": "msk",
      "front": "What is a sling used for?",
      "back": "Supporting and resting an injured arm, shoulder or collarbone.",
      "tags": []
    },
    {
      "id": "f212",
      "domainId": "msk",
      "front": "Care for a suspected collarbone fracture?",
      "back": "Support the arm in a sling against the body and arrange care.",
      "tags": []
    },
    {
      "id": "f213",
      "domainId": "msk",
      "front": "Care for a finger or toe injury?",
      "back": "Support it, buddy tape to the neighbour if appropriate, check circulation, and seek care if needed.",
      "tags": []
    },
    {
      "id": "f214",
      "domainId": "msk",
      "front": "What is the risk if a splint is too tight?",
      "back": "It can cut off circulation. Check fingers or toes for warmth, colour and feeling.",
      "tags": []
    },
    {
      "id": "f215",
      "domainId": "msk",
      "front": "Care for a knee or ankle that cannot bear weight?",
      "back": "Immobilise, do not force weight on it, and arrange assessment.",
      "tags": [
        "wilderness"
      ]
    },
    {
      "id": "f216",
      "domainId": "environment",
      "front": "Signs of frostbite?",
      "back": "Cold, hard, pale or waxy skin that is numb, usually on fingers, toes, ears or nose.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f217",
      "domainId": "environment",
      "front": "How do you treat frostbite in the field?",
      "back": "Protect the area, do not rub it, and only rewarm if there is no chance of refreezing.",
      "tags": [
        "wilderness"
      ]
    },
    {
      "id": "f218",
      "domainId": "environment",
      "front": "Care for a lightning strike patient?",
      "back": "Scene safety first, then treat for cardiac arrest or burns. Lightning patients are safe to touch.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f219",
      "domainId": "environment",
      "front": "Signs of dehydration?",
      "back": "Thirst, dark urine, headache, dizziness, and fatigue.",
      "tags": []
    },
    {
      "id": "f220",
      "domainId": "environment",
      "front": "Care for a jellyfish or marine sting?",
      "back": "Rinse as appropriate for the species, remove tentacles carefully, and watch for severe reactions.",
      "tags": [
        "marine"
      ]
    },
    {
      "id": "f221",
      "domainId": "environment",
      "front": "Why is wind important in cold injury?",
      "back": "Wind strips heat from the body fast, lowering the effective temperature.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f222",
      "domainId": "environment",
      "front": "Stages of hypothermia in simple terms?",
      "back": "Mild with shivering and clumsiness, then moderate with confusion and loss of shivering, then severe and life threatening.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f223",
      "domainId": "medical",
      "front": "What is COPD and a key care point?",
      "back": "A long-term lung disease. Help the patient sit up, assist with their inhaler, and get help if they worsen.",
      "tags": []
    },
    {
      "id": "f224",
      "domainId": "medical",
      "front": "High blood sugar over time can cause?",
      "back": "Gradual illness with thirst, frequent urination, and confusion. Arrange medical care.",
      "tags": []
    },
    {
      "id": "f225",
      "domainId": "medical",
      "front": "How do you tell a faint from a seizure?",
      "back": "A faint is brief with quick recovery. A seizure usually has convulsions and a longer confused recovery.",
      "tags": []
    },
    {
      "id": "f226",
      "domainId": "medical",
      "front": "Care for severe abdominal pain?",
      "back": "Keep the patient comfortable, nothing by mouth, watch for shock, and arrange assessment.",
      "tags": []
    },
    {
      "id": "f227",
      "domainId": "medical",
      "front": "Signs of a suspected opioid overdose?",
      "back": "Very slow or absent breathing, tiny pupils, and unresponsiveness.",
      "tags": []
    },
    {
      "id": "f228",
      "domainId": "medical",
      "front": "Care for a suspected opioid overdose?",
      "back": "Support breathing, give naloxone if available and within scope, and arrange urgent transport.",
      "tags": []
    },
    {
      "id": "f229",
      "domainId": "medical",
      "front": "Care for an intoxicated patient who is drowsy?",
      "back": "Protect the airway, place on their side, monitor breathing, and watch for hidden injury.",
      "tags": []
    },
    {
      "id": "f230",
      "domainId": "medical",
      "front": "Why is an unconscious cause sometimes hard to know?",
      "back": "Many problems look similar. Treat what you see, protect the airway, and get help.",
      "tags": []
    },
    {
      "id": "f231",
      "domainId": "mental",
      "front": "First step in de-escalating an agitated person?",
      "back": "Stay calm, keep a safe distance, speak slowly, and listen.",
      "tags": []
    },
    {
      "id": "f232",
      "domainId": "mental",
      "front": "Why avoid arguing with a distressed patient?",
      "back": "It raises tension. Acknowledge their feelings and focus on safety and help.",
      "tags": []
    },
    {
      "id": "f233",
      "domainId": "mental",
      "front": "How can you support a grieving coworker after a death on site?",
      "back": "Be present, listen, avoid clichés, and connect them with support.",
      "tags": []
    },
    {
      "id": "f234",
      "domainId": "transport",
      "front": "What is a key safety rule around a helicopter?",
      "back": "Approach only when signalled, from the front in view of the pilot, and stay low.",
      "tags": [
        "wilderness",
        "marine",
        "forestry"
      ]
    },
    {
      "id": "f235",
      "domainId": "transport",
      "front": "Why secure a patient fully to a stretcher?",
      "back": "To prevent movement and further injury during a carry or rough transport.",
      "tags": []
    },
    {
      "id": "f236",
      "domainId": "transport",
      "front": "What matters most in a long carry-out?",
      "back": "Teamwork, footing, rest rotations, and keeping the patient warm and monitored.",
      "tags": [
        "wilderness",
        "forestry"
      ]
    },
    {
      "id": "f237",
      "domainId": "transport",
      "front": "Water transport of a patient: a key concern?",
      "back": "Keeping them warm, secure and monitored, and protecting the airway from water and motion.",
      "tags": [
        "marine"
      ]
    },
    {
      "id": "f238",
      "domainId": "transport",
      "front": "What is the transfer of patient responsibility?",
      "back": "Handing over care to the next level with a clear, complete report.",
      "tags": []
    },
    {
      "id": "f239",
      "domainId": "infection",
      "front": "Order of removing contaminated gloves?",
      "back": "Peel them off without touching the outside, then wash your hands.",
      "tags": []
    },
    {
      "id": "f240",
      "domainId": "infection",
      "front": "What to report after a needlestick or fluid exposure?",
      "back": "Report it promptly through your workplace so follow-up care can be arranged.",
      "tags": []
    },
    {
      "id": "f241",
      "domainId": "infection",
      "front": "What are the stages of labour in brief?",
      "back": "Contractions and opening, then delivery of the baby, then delivery of the placenta.",
      "tags": []
    },
    {
      "id": "f242",
      "domainId": "infection",
      "front": "After the placenta delivers, a key concern?",
      "back": "Watch for heavy bleeding in the mother, keep her warm, and arrange transport.",
      "tags": []
    },
    {
      "id": "f243",
      "domainId": "role",
      "front": "Why practise emergency drills?",
      "back": "Drills find gaps in the plan and make a real response faster and calmer.",
      "tags": [
        "industrial",
        "forestry"
      ]
    },
    {
      "id": "f244",
      "domainId": "role",
      "front": "What is scope of practice?",
      "back": "The skills and treatments you are trained and authorised to perform. Stay within it.",
      "tags": []
    },
    {
      "id": "f245",
      "domainId": "role",
      "front": "Why keep the first aid kit and room stocked and checked?",
      "back": "So supplies are ready and not expired when an emergency happens.",
      "tags": []
    },
    {
      "id": "f246",
      "domainId": "role",
      "front": "What is a transport endorsement?",
      "back": "An added qualification allowing the attendant to accompany and care for a patient during transport.",
      "tags": [
        "forestry",
        "industrial"
      ]
    },
    {
      "id": "f247",
      "domainId": "assessment",
      "front": "What is capillary refill and what does slow refill suggest?",
      "back": "Press a nail bed and release. Colour should return in about two seconds. Slow return can suggest poor circulation.",
      "tags": []
    },
    {
      "id": "f248",
      "domainId": "assessment",
      "front": "Blunt versus penetrating mechanism: why does it matter?",
      "back": "Both can be deadly. Penetrating injuries can hide deep damage along the path, blunt injuries spread energy widely.",
      "tags": [
        "construction",
        "forestry"
      ]
    },
    {
      "id": "f249",
      "domainId": "assessment",
      "front": "Can you clear a spine in the field?",
      "back": "No. You cannot rule out a spinal injury in the field by examination alone. Go by mechanism and findings.",
      "tags": []
    },
    {
      "id": "f250",
      "domainId": "assessment",
      "front": "What is triage?",
      "back": "Sorting multiple patients by who needs care most urgently when resources are limited.",
      "tags": [
        "industrial",
        "construction"
      ]
    },
    {
      "id": "f251",
      "domainId": "assessment",
      "front": "Why gather history from bystanders if the patient cannot speak?",
      "back": "They may know what happened, the patient's conditions and medications, and the timeline.",
      "tags": []
    },
    {
      "id": "f252",
      "domainId": "assessment",
      "front": "What is a general impression?",
      "back": "Your first read of how sick or hurt a patient looks as you approach, which sets your urgency.",
      "tags": []
    },
    {
      "id": "f253",
      "domainId": "assessment",
      "front": "Why does the transport decision come before the secondary survey?",
      "back": "Because deciding on rapid transport early saves time for the sickest patients.",
      "tags": []
    },
    {
      "id": "f254",
      "domainId": "airway",
      "front": "Care for a patient who is vomiting and at risk to their airway?",
      "back": "Position to let it drain, suction or clear as needed, and protect the spine if injury is suspected.",
      "tags": []
    },
    {
      "id": "f255",
      "domainId": "airway",
      "front": "What is positional asphyxia?",
      "back": "When a body position blocks breathing. Do not leave an at-risk patient face down or doubled over.",
      "tags": []
    },
    {
      "id": "f256",
      "domainId": "airway",
      "front": "What do you do with dentures during airway care?",
      "back": "Leave well-fitting dentures in place. Remove them only if loose and blocking the airway.",
      "tags": []
    },
    {
      "id": "f257",
      "domainId": "airway",
      "front": "Ventilation rate for an adult in respiratory arrest versus during CPR?",
      "back": "About one breath every six seconds with a pulse, and 30 to 2 with compressions if there is no pulse.",
      "tags": []
    },
    {
      "id": "f258",
      "domainId": "airway",
      "front": "Why keep an unresponsive breathing patient on their side?",
      "back": "It keeps the airway open and lets fluids drain, reducing the risk of choking.",
      "tags": []
    },
    {
      "id": "f259",
      "domainId": "circulation",
      "front": "What is the Chain of Survival?",
      "back": "The linked steps that improve cardiac arrest survival: early recognition and call, early CPR, early defibrillation, and advanced care.",
      "tags": []
    },
    {
      "id": "f260",
      "domainId": "circulation",
      "front": "Where exactly do you place your hands for adult compressions?",
      "back": "On the centre of the chest, the lower half of the breastbone, heel of one hand with the other on top.",
      "tags": []
    },
    {
      "id": "f261",
      "domainId": "circulation",
      "front": "Why allow full chest recoil between compressions?",
      "back": "It lets the heart refill, so the next compression moves more blood.",
      "tags": []
    },
    {
      "id": "f262",
      "domainId": "circulation",
      "front": "What if the AED says no shock advised?",
      "back": "Resume CPR immediately and follow the prompts. Not every rhythm is shockable.",
      "tags": []
    },
    {
      "id": "f263",
      "domainId": "circulation",
      "front": "When can you stop CPR?",
      "back": "When the patient recovers, a trained provider takes over, an AED directs you, or you are physically unable to continue.",
      "tags": []
    },
    {
      "id": "f264",
      "domainId": "circulation",
      "front": "Shock positioning for a conscious patient with no spinal concern?",
      "back": "Lay them flat and keep them warm. Do not sit them up if they are faint.",
      "tags": []
    },
    {
      "id": "f265",
      "domainId": "circulation",
      "front": "What is a hemostatic dressing?",
      "back": "A dressing that helps blood clot, packed into a wound where a tourniquet cannot be used, with pressure held.",
      "tags": [
        "forestry",
        "construction"
      ]
    },
    {
      "id": "f266",
      "domainId": "circulation",
      "front": "After a tourniquet is applied, who loosens it?",
      "back": "Leave it in place and let the receiving medical team manage it. Note the time it went on.",
      "tags": [
        "forestry",
        "construction"
      ]
    },
    {
      "id": "f267",
      "domainId": "spine",
      "front": "What is the goal of spinal precautions?",
      "back": "To prevent movement that could worsen a cord injury until the patient is at definitive care.",
      "tags": []
    },
    {
      "id": "f268",
      "domainId": "spine",
      "front": "Quick neuro check for a conscious spinal patient?",
      "back": "Ask about numbness or tingling and check whether they can feel and move fingers and toes.",
      "tags": []
    },
    {
      "id": "f269",
      "domainId": "spine",
      "front": "Why keep a spinal patient comfortable and reassured?",
      "back": "Calm patients move less, and fear and pain make them want to move.",
      "tags": []
    },
    {
      "id": "f270",
      "domainId": "spine",
      "front": "Does a penetrating injury to the back change spinal care?",
      "back": "It still requires care. Avoid unnecessary movement and arrange transport.",
      "tags": []
    },
    {
      "id": "f271",
      "domainId": "trauma",
      "front": "What is crush syndrome and why care after release?",
      "back": "Prolonged crushing can release harmful substances when pressure comes off. Such patients need urgent medical care.",
      "tags": [
        "industrial",
        "construction"
      ]
    },
    {
      "id": "f272",
      "domainId": "trauma",
      "front": "Care for a degloving or skin-stripping injury?",
      "back": "Control bleeding, cover with a clean moist dressing, keep any tissue, and arrange urgent care.",
      "tags": [
        "industrial",
        "forestry"
      ]
    },
    {
      "id": "f273",
      "domainId": "trauma",
      "front": "Care for a blast injury?",
      "back": "Scene safety first, then check for blast effects on the lungs, ears and hidden internal injury, and transport.",
      "tags": [
        "industrial"
      ]
    },
    {
      "id": "f274",
      "domainId": "trauma",
      "front": "What is the priority with major facial trauma?",
      "back": "The airway, because blood, swelling and broken structures can block it.",
      "tags": []
    },
    {
      "id": "f275",
      "domainId": "trauma",
      "front": "Care for genital or groin bleeding?",
      "back": "Apply direct pressure with a clean dressing, manage for shock, and arrange care.",
      "tags": []
    },
    {
      "id": "f276",
      "domainId": "msk",
      "front": "What is a traction splint used for, in concept?",
      "back": "Stabilising certain mid-thigh fractures by applying gentle pull, if trained and equipped.",
      "tags": [
        "forestry",
        "wilderness"
      ]
    },
    {
      "id": "f277",
      "domainId": "msk",
      "front": "Warning signs of compartment syndrome?",
      "back": "Severe, increasing pain out of proportion, tightness, numbness, and pain on stretching. It is urgent.",
      "tags": []
    },
    {
      "id": "f278",
      "domainId": "msk",
      "front": "Care for a dislocated kneecap or shoulder in the field?",
      "back": "Support as found, do not force it back, check circulation, and arrange care.",
      "tags": []
    },
    {
      "id": "f279",
      "domainId": "msk",
      "front": "Difference between a strain and a sprain?",
      "back": "A strain is a stretched or torn muscle or tendon, a sprain is a stretched or torn ligament at a joint.",
      "tags": []
    },
    {
      "id": "f280",
      "domainId": "msk",
      "front": "Why elevate a sprained limb?",
      "back": "Elevation helps reduce swelling along with rest, ice and gentle compression.",
      "tags": []
    },
    {
      "id": "f281",
      "domainId": "softtissue",
      "front": "Difference between a laceration and an abrasion?",
      "back": "A laceration is a cut, an abrasion is a scrape. Both need cleaning and protection.",
      "tags": []
    },
    {
      "id": "f282",
      "domainId": "softtissue",
      "front": "What is an avulsion?",
      "back": "A flap of skin or tissue torn loose. Clean gently, lay the flap back if possible, cover, and seek care.",
      "tags": []
    },
    {
      "id": "f283",
      "domainId": "softtissue",
      "front": "Why are puncture wounds deceptively risky?",
      "back": "They look small but can be deep and trap bacteria, raising infection risk.",
      "tags": []
    },
    {
      "id": "f284",
      "domainId": "softtissue",
      "front": "Principle of bandaging?",
      "back": "Cover the wound with a clean dressing first, then bandage firmly enough to stay put without cutting off circulation.",
      "tags": []
    },
    {
      "id": "f285",
      "domainId": "softtissue",
      "front": "When should tetanus be considered?",
      "back": "With dirty or puncture wounds. Advise the patient to check their tetanus status with a clinician.",
      "tags": []
    },
    {
      "id": "f286",
      "domainId": "softtissue",
      "front": "Care for a bruise with swelling?",
      "back": "Rest, ice, and elevation. Watch for signs of deeper injury if the mechanism was significant.",
      "tags": []
    },
    {
      "id": "f287",
      "domainId": "environment",
      "front": "What are heat cramps and basic care?",
      "back": "Painful muscle cramps in the heat. Rest in a cool place, stretch gently, and rehydrate.",
      "tags": []
    },
    {
      "id": "f288",
      "domainId": "environment",
      "front": "What is cold water shock?",
      "back": "The gasp and rapid breathing on sudden cold immersion, which can lead to drowning. Keep the airway above water.",
      "tags": [
        "marine"
      ]
    },
    {
      "id": "f289",
      "domainId": "environment",
      "front": "Why does a near drowning patient deteriorate later?",
      "back": "Water and irritation in the lungs can impair breathing over the following hours.",
      "tags": [
        "marine",
        "wilderness"
      ]
    },
    {
      "id": "f290",
      "domainId": "environment",
      "front": "Signs of carbon monoxide poisoning?",
      "back": "Headache, nausea, dizziness and confusion, often affecting several people in the same space.",
      "tags": [
        "industrial",
        "marine"
      ]
    },
    {
      "id": "f291",
      "domainId": "environment",
      "front": "Care for suspected carbon monoxide poisoning?",
      "back": "Get everyone to fresh air if safe, give oxygen if trained, and arrange medical care.",
      "tags": [
        "industrial",
        "marine"
      ]
    },
    {
      "id": "f292",
      "domainId": "environment",
      "front": "Care for an animal bite?",
      "back": "Control bleeding, clean the wound, cover it, and seek care, as bites carry high infection risk.",
      "tags": [
        "wilderness",
        "forestry"
      ]
    },
    {
      "id": "f293",
      "domainId": "environment",
      "front": "Field rewarming methods for mild hypothermia?",
      "back": "Shelter from wind, remove wet clothing, insulate, add warm dry layers, and offer warm sweet drinks if fully alert.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f294",
      "domainId": "environment",
      "front": "Why handle a severely hypothermic patient as fragile?",
      "back": "The cold heart can stop with rough movement, so move them gently and minimally.",
      "tags": [
        "wilderness",
        "marine"
      ]
    },
    {
      "id": "f295",
      "domainId": "medical",
      "front": "Angina versus heart attack in simple terms?",
      "back": "Angina is chest pain that often eases with rest. A heart attack is more severe and does not ease. Treat worrying chest pain as cardiac.",
      "tags": []
    },
    {
      "id": "f296",
      "domainId": "medical",
      "front": "Care for hyperventilation from anxiety?",
      "back": "Reassure and coach slow breathing, and rule out a physical cause before assuming anxiety.",
      "tags": []
    },
    {
      "id": "f297",
      "domainId": "medical",
      "front": "BE-FAST for stroke adds what to FAST?",
      "back": "Balance and Eyes, alongside Face, Arms, Speech and Time.",
      "tags": []
    },
    {
      "id": "f298",
      "domainId": "medical",
      "front": "Four routes a poison can enter the body?",
      "back": "Swallowed, inhaled, absorbed through the skin, or injected.",
      "tags": [
        "industrial"
      ]
    },
    {
      "id": "f299",
      "domainId": "medical",
      "front": "Care for a poison absorbed on the skin?",
      "back": "Remove contaminated clothing, brush off dry chemicals, rinse the skin, and follow Poison Control or EMS advice.",
      "tags": [
        "industrial"
      ]
    },
    {
      "id": "f300",
      "domainId": "medical",
      "front": "Signs of very high blood sugar over time?",
      "back": "Thirst, frequent urination, drowsiness and a gradual decline. Arrange medical care.",
      "tags": []
    },
    {
      "id": "f301",
      "domainId": "medical",
      "front": "Care for a mild allergic reaction without breathing trouble?",
      "back": "Monitor closely for worsening, and treat as anaphylaxis at once if breathing or swelling appears.",
      "tags": []
    },
    {
      "id": "f302",
      "domainId": "medical",
      "front": "Why give nothing by mouth to a seriously ill or injured patient?",
      "back": "They may need surgery or may vomit and choke, so food and drink can be dangerous.",
      "tags": []
    },
    {
      "id": "f303",
      "domainId": "mental",
      "front": "Signs of a panic attack?",
      "back": "Sudden intense fear, fast breathing, racing heart, and a feeling of losing control. Reassure and rule out physical causes.",
      "tags": []
    },
    {
      "id": "f304",
      "domainId": "mental",
      "front": "How do you keep yourself safe with an unpredictable patient?",
      "back": "Keep distance and an exit, do not turn your back, and get help. Your safety comes first.",
      "tags": [
        "industrial",
        "construction"
      ]
    },
    {
      "id": "f305",
      "domainId": "mental",
      "front": "What is acute stress after a critical incident?",
      "back": "A strong short-term reaction to a traumatic event, which is normal and usually eases with support.",
      "tags": []
    },
    {
      "id": "f306",
      "domainId": "mental",
      "front": "How can a workplace support responders after a serious call?",
      "back": "Debriefing, peer support, time, and access to professional help such as a critical incident stress program.",
      "tags": []
    },
    {
      "id": "f307",
      "domainId": "transport",
      "front": "What is a scoop or a vacuum mattress used for?",
      "back": "Lifting and immobilising a patient with minimal movement for transport, if available and trained.",
      "tags": []
    },
    {
      "id": "f308",
      "domainId": "transport",
      "front": "Why do GPS coordinates matter in a remote call?",
      "back": "They let BCEHS or aircraft find you quickly when there is no street address.",
      "tags": [
        "wilderness",
        "marine",
        "forestry"
      ]
    },
    {
      "id": "f309",
      "domainId": "transport",
      "front": "What is the key sequence for packaging a spinal patient?",
      "back": "Stabilise the head, apply a collar if indicated, move as a team onto the device, then secure the body and head.",
      "tags": []
    },
    {
      "id": "f310",
      "domainId": "transport",
      "front": "Why reassess during transport?",
      "back": "Patients can deteriorate while moving, and you are still responsible for their care.",
      "tags": []
    },
    {
      "id": "f311",
      "domainId": "transport",
      "front": "What is a realistic limit of the attendant in transport?",
      "back": "To provide care and monitoring within scope, not to replace the hospital. Get to definitive care.",
      "tags": []
    },
    {
      "id": "f312",
      "domainId": "infection",
      "front": "What are bloodborne pathogens?",
      "back": "Infectious organisms carried in blood, such as those causing hepatitis or HIV. Use protection.",
      "tags": []
    },
    {
      "id": "f313",
      "domainId": "infection",
      "front": "What is crowning in childbirth?",
      "back": "When the baby's head becomes visible at the opening, a sign birth is very near.",
      "tags": []
    },
    {
      "id": "f314",
      "domainId": "infection",
      "front": "After a baby is born, if it is not breathing, what do you do?",
      "back": "Dry and stimulate it, keep it warm, and begin newborn resuscitation if needed while help is arranged.",
      "tags": []
    },
    {
      "id": "f315",
      "domainId": "infection",
      "front": "Care of the umbilical cord in the field?",
      "back": "Keep the baby warm and at the level of the mother, and follow EMS guidance. Do not cut it unless trained and instructed.",
      "tags": []
    },
    {
      "id": "f316",
      "domainId": "infection",
      "front": "Why is hand hygiene central to infection control?",
      "back": "Clean hands before and after care reduce spread of infection to you and the patient.",
      "tags": []
    },
    {
      "id": "f317",
      "domainId": "role",
      "front": "What is duty to respond for a workplace attendant?",
      "back": "When on duty as the attendant, you are expected to respond to calls for first aid within your scope.",
      "tags": []
    },
    {
      "id": "f318",
      "domainId": "role",
      "front": "Why act in good faith and within training?",
      "back": "Acting reasonably within your training and scope is how you help safely and responsibly.",
      "tags": []
    },
    {
      "id": "f319",
      "domainId": "role",
      "front": "What goes in a first aid record?",
      "back": "What happened, the time, your findings, the care given, and the patient's response, kept confidential.",
      "tags": []
    },
    {
      "id": "f320",
      "domainId": "role",
      "front": "How do consent and a minor interact?",
      "back": "For a minor, consent usually involves a parent or guardian, but never withhold emergency life-saving care.",
      "tags": []
    },
    {
      "id": "f321",
      "domainId": "role",
      "front": "Why support the patient emotionally, not just physically?",
      "back": "Calm reassurance reduces fear, which can reduce harmful movement and help the patient cooperate.",
      "tags": []
    }
  ],
  "quiz": [
    {
      "id": "q1",
      "domainId": "role",
      "stem": "You arrive and the scene is not safe. You should:",
      "options": [
        "Enter quickly to reach the patient",
        "Make it safe or wait for the right help",
        "Start treatment from a distance",
        "Send the patient out yourself"
      ],
      "answer": 1,
      "rationale": "Never enter an unsafe scene. An injured rescuer cannot help and adds a second casualty.",
      "tags": [
        "industrial"
      ]
    },
    {
      "id": "q2",
      "domainId": "role",
      "stem": "A capable adult refuses your care. The right action is to:",
      "options": [
        "Treat them anyway",
        "Restrain them",
        "Respect the refusal and explain the risks",
        "Leave without a word"

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;
const C = window.AFA_CONTENT;

/* ---------- storage with graceful fallback ---------- */
const mem = {};
const store = {
  get(k){ try{ const v = localStorage.getItem(k); return v==null?null:JSON.parse(v);}catch(e){ return k in mem?mem[k]:null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ mem[k]=v; } }
};
const todayStr = () => new Date().toISOString().slice(0,10);
const daysBetween = (a,b)=> Math.round((new Date(b)-new Date(a))/86400000);

/* ---------- industries ---------- */
const INDUSTRIES = [
  {id:"wilderness", label:"Wilderness / guiding", evac:"remote"},
  {id:"marine",     label:"Marine / fishing",     evac:"remote"},
  {id:"film",       label:"Film / TV location",   evac:"remote"},
  {id:"forestry",   label:"Forestry / logging",   evac:"remote"},
  {id:"industrial", label:"Mining / oil and gas", evac:"remote"},
  {id:"construction",label:"Construction / urban", evac:"accessible"}
];

/* ---------- default profile + progress ---------- */
function loadState(){
  return {
    profile: store.get("afa_profile"),
    items: store.get("afa_items") || {},      // id -> {due, interval, ease, reps}
    domains: store.get("afa_domains") || {},  // id -> {seen, correct, attempts, last}
    streak: store.get("afa_streak") || {count:0,last:null},
    seenDisc: store.get("afa_disc") || false
  };
}

/* ---------- SM-2 lite ---------- */
function gradeItem(s, grade){
  s = s || {interval:0, ease:2.5, reps:0};
  let {interval, ease, reps} = s;
  if(grade==="again"){ interval = 0; reps = 0; ease = Math.max(1.3, ease-0.2); }
  else if(grade==="good"){ reps += 1; interval = reps===1?1:reps===2?3:Math.round(interval*ease); }
  else if(grade==="easy"){ reps += 1; interval = Math.max(2, Math.round((interval||1)*ease*1.3)); ease += 0.05; }
  const due = new Date(); due.setDate(due.getDate()+interval);
  return {interval, ease, reps, due: due.toISOString().slice(0,10)};
}

/* ---------- readiness per domain ---------- */
function readiness(domain, dstat, contentCount){
  if(!dstat || !dstat.attempts) return {score:null, status:"new"};
  const acc = dstat.correct / dstat.attempts;
  const halfLife = domain.halfLife || 30;
  const since = dstat.last ? daysBetween(dstat.last, todayStr()) : 999;
  const recency = Math.exp(-Math.max(0,since)/halfLife);
  const coverage = Math.min(1, (dstat.seenIds ? dstat.seenIds.length : dstat.seen||0) / Math.max(1,contentCount));
  const score = Math.round(100*acc*recency*coverage);
  const status = score<40 ? "low" : "ok";
  return {score, status};
}
function vitalColor(score,status){
  if(status==="new") return "var(--vital-new)";
  if(score>=65) return "var(--vital-good)";
  if(score>=40) return "var(--vital-fade)";
  return "var(--vital-low)";
}

/* ================= Today ================= */
function buildSession(st, evac){
  const today = todayStr();
  const dueCards = C.flashcards.filter(f=>{ const s=st.items[f.id]; return !s || s.due<=today; });
  // prioritise high stakes + current industry tags
  const ind = st.profile.industry;
  const score = (f)=>{ const dm=C.domains.find(d=>d.id===f.domainId); let s=0;
    if(dm&&dm.stakes==="high") s+=2; if(f.tags&&f.tags.includes(ind)) s+=1; return s; };
  const cards = dueCards.sort((a,b)=>score(b)-score(a)).slice(0,6);

  // weakest domain
  const ranked = C.domains.map(d=>{
    const cnt = C.flashcards.filter(f=>f.domainId===d.id).length + C.quiz.filter(q=>q.domainId===d.id).length;
    const r = readiness(d, st.domains[d.id], cnt);
    return {d, r};
  }).sort((a,b)=>{
    const av=a.r.status==="new"?-5:a.r.score, bv=b.r.status==="new"?-5:b.r.score;
    const aw=a.d.stakes==="high"?10:0, bw=b.d.stakes==="high"?10:0;
    return (av+(-aw)) - (bv+(-bw));
  });
  const weak = ranked[0].d;

  const scenarioPool = C.scenarios.filter(s=> s.tags.includes(ind) || s.domainIds.includes(weak.id));
  const scenario = (scenarioPool[0] || C.scenarios[Math.floor(Math.random()*C.scenarios.length)]);

  const quiz = C.quiz.filter(q=>q.domainId===weak.id).slice(0,3);
  const quizFill = quiz.length<3 ? C.quiz.filter(q=>!quiz.includes(q)).slice(0,3-quiz.length) : [];
  const lesson = C.microlessons.find(m=>m.domainId===weak.id) || C.microlessons[0];

  const steps=[];
  cards.forEach(c=>steps.push({type:"card",data:c}));
  if(scenario) steps.push({type:"scenario",data:scenario});
  [...quiz,...quizFill].forEach(q=>steps.push({type:"quiz",data:q}));
  if(lesson) steps.push({type:"lesson",data:lesson});
  return {steps, weak:weak.name};
}

    <div className="card dose-card">

function Vital({d,r}){
  const col = vitalColor(r.score,r.status);

    <div className="grow">
      <span className="gname">{d.stakes==="high"&&<span className="star">★ </span>}{d.name}
        {r.status==="low" && <span className="gflag">fading</span>}
        {r.status==="new" && <span className="gflag gnew">new</span>}
      </span>
      <span className="gval" style={{color: r.status==="new"?"var(--faint)":col}}>{r.status==="new"?"—":r.score}</span>
    </div>
    <div className="gtrack"><div className="gfill" style={{width:pct+"%",background: r.status==="new"?"var(--faint)":col}}/></div>

/* ================= Session Runner ================= */
function SessionRunner({session, evac, onItem, onDomain, onSeen, onFinish}){
  const [i,setI]=useState(0);
  const steps=session.steps;
  if(i>=steps.length) return <SessionDone weak={session.weak} onFinish={onFinish}/>;
  const step=steps[i];
  const next=()=>setI(i+1);

  return (<div className="screen">
    <Progress i={i} n={steps.length}/>
    {step.type==="card" && <CardStep key={"c"+i+step.data.id} card={step.data} onGrade={(g)=>{ onItem(step.data.id,g); onSeen(step.data.domainId,step.data.id); onDomain(step.data.domainId, g!=="again"); next(); }}/>}
    {step.type==="quiz" && <QuizStep key={"q"+i+step.data.id} q={step.data} onDone={(ok)=>{ onSeen(step.data.domainId,step.data.id); onDomain(step.data.domainId, ok); next(); }}/>}
    {step.type==="scenario" && <ScenarioStep key={"s"+i+step.data.id} s={step.data} evac={evac} onDone={(ok)=>{ step.data.domainIds.forEach(d=>onDomain(d, ok)); next(); }}/>}

function ScenarioStep({s,evac,onDone}){
  const [nodeId,setNodeId]=useState(s.start);
  const [score,setScore]=useState(0);
  const [fb,setFb]=useState(null);
  const node=s.nodes[nodeId];

  useEffect(()=>{
    if(node && node.modeSplit){
      setFb(null);
      const nxt = node.modeSplit[evac] || node.modeSplit.remote;
      const t=setTimeout(()=>setNodeId(nxt),900);
      return ()=>clearTimeout(t);
    }
  },[nodeId]);

  if(node.modeSplit){
    return (<div>
      <p className="eyebrow">Scenario · {s.title}</p>
      <div className="card">
        <div className="mode-tag">{evac==="remote"?"Remote evacuation profile":"Accessible site profile"}</div>
        <p className="scene-prompt">{node.prompt}</p>
        <p className="muted">Adjusting to your environment…</p>
      </div>
    </div>);
  }
  const ending = !node.choices || node.choices.length===0;
  return (<div>
    <p className="eyebrow">Scenario · {s.title}</p>
    <div className="card">
      <p className="scene-prompt">{node.prompt}</p>
      {fb && <div className={"scene-feedback "+(fb.type==="good"?"fb-good":"fb-bad")}>{fb.text}</div>}
      {!ending && node.choices.map((c,idx)=>(
        <button key={idx} className="opt" onClick={()=>{
          setScore(score+(c.score||0));
          if(c.feedback){ setFb(c.feedback); }
          else setFb(null);
          setTimeout(()=> setNodeId(c.next), c.feedback?650:120);
        }}>{c.label}</button>
      ))}
    </div>
    {ending && <button className="btn btn-amber" onClick={()=>onDone(score>=3)}>Continue</button>}
  </div>);
}
function LessonStep({m,onDone}){
  return (<div>
    <p className="eyebrow">Field note</p>
    <div className="card">
      <h2 className="h2" style={{marginTop:0}}>{m.title}</h2>

      return (<div key={d.id} className="list-row" onClick={()=>open({kind:"domain",domain:d})}>
        <div>
          <div style={{fontWeight:600,fontSize:15}}>{d.stakes==="high"&&<span className="star">★ </span>}{d.name}</div>
          <div className="meta">{cards} cards · {quiz} quiz · {sc} scenarios</div>
        </div>
        <div className="chev">›</div>
      </div>);
    })}
  </div>);
}

/* ================= Reference ================= */
function Reference({open}){
  const [q,setQ]=useState("");
  const list=C.microlessons.filter(m=> (m.title+" "+m.body).toLowerCase().includes(q.toLowerCase()));
  return (<div className="screen">
    <p className="eyebrow">Look it up</p>
    <h1 className="h1">Reference</h1>
    <div className="search" style={{marginBottom:14}}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input className="input" placeholder="Search field notes" value={q} onChange={e=>setQ(e.target.value)} />
    </div>
    {list.length===0 && <p className="muted">No notes match that. Try another word.</p>}
    {list.map(m=>{ const dm=C.domains.find(d=>d.id===m.domainId);
      return (<div key={m.id} className="list-row" onClick={()=>open({kind:"lesson",lesson:m})}>
        <div><div style={{fontWeight:600,fontSize:15}}>{m.title}</div><div className="meta">{dm?dm.name:""}</div></div>
        <div className="chev">›</div>
      </div>);})}
  </div>);
}

/* ================= Detail views ================= */
function DetailView({view, evac, onItem, onDomain, onSeen, back}){
  if(view.kind==="lesson"){
    const m=view.lesson;
    return (<div className="screen">
      <button className="btn btn-ghost" style={{width:"auto",padding:"8px 14px",marginBottom:14}} onClick={back}>‹ Back</button>
      <div className="card">
        <h1 className="h1" style={{fontSize:22}}>{m.title}</h1>
        <div className="micro-body">{m.body.split("\n\n").map((p,i)=><p key={i}>{p}</p>)}</div>
      </div>
    </div>);
  }
  if(view.kind==="domain"){
    return <DomainPractice d={view.domain} evac={evac} onItem={onItem} onDomain={onDomain} onSeen={onSeen} back={back}/>;
  }
  return null;
}
function DomainPractice({d,evac,onItem,onDomain,onSeen,back}){
  const [mode,setMode]=useState(null);
  const cards=C.flashcards.filter(f=>f.domainId===d.id);
  const quiz=C.quiz.filter(q=>q.domainId===d.id);
  const scens=C.scenarios.filter(s=>s.domainIds.includes(d.id));
  const [i,setI]=useState(0);

  if(!mode) return (<div className="screen">
    <button className="btn btn-ghost" style={{width:"auto",padding:"8px 14px",marginBottom:14}} onClick={back}>‹ Back</button>
    <h1 className="h1">{d.name}</h1>
    {cards.length>0 && <div className="list-row" onClick={()=>{setMode("cards");setI(0);}}><div style={{fontWeight:600}}>Flashcards</div><div className="meta">{cards.length}</div></div>}
    {quiz.length>0 && <div className="list-row" onClick={()=>{setMode("quiz");setI(0);}}><div style={{fontWeight:600}}>Quiz</div><div className="meta">{quiz.length}</div></div>}
    {scens.length>0 && <div className="list-row" onClick={()=>{setMode("scen");setI(0);}}><div style={{fontWeight:600}}>Scenarios</div><div className="meta">{scens.length}</div></div>}
  </div>);

  const set = mode==="cards"?cards:mode==="quiz"?quiz:scens;
  if(i>=set.length) return (<div className="screen"><div className="card center" style={{padding:30}}>
    <h2 className="h2" style={{marginTop:0}}>Set complete</h2>
    <button className="btn btn-amber" onClick={()=>setMode(null)}>Back to {d.name}</button>
  </div></div>);

  return (<div className="screen">
    <button className="btn btn-ghost" style={{width:"auto",padding:"8px 14px",marginBottom:10}} onClick={()=>setMode(null)}>‹ {d.name}</button>
    <Progress i={i} n={set.length}/>
    {mode==="cards" && <CardStep key={set[i].id} card={set[i]} onGrade={(g)=>{onItem(set[i].id,g);onSeen(d.id,set[i].id);onDomain(d.id,g!=="again");setI(i+1);}}/>}
    {mode==="quiz" && <QuizStep key={set[i].id} q={set[i]} onDone={(ok)=>{onSeen(d.id,set[i].id);onDomain(d.id,ok);setI(i+1);}}/>}
    {mode==="scen" && <ScenarioStep key={set[i].id} s={set[i]} evac={evac} onDone={(ok)=>{set[i].domainIds.forEach(x=>onDomain(x,ok));setI(i+1);}}/>}
  </div>);
}

/* ================= Me ================= */
function Me({st,evac,setSt}){
  const board=C.domains.map(d=>{
    const cnt=C.flashcards.filter(f=>f.domainId===d.id).length+C.quiz.filter(q=>q.domainId===d.id).length;
    return {d,r:readiness(d,st.domains[d.id],cnt)};
  });
  const ind=INDUSTRIES.find(i=>i.id===st.profile.industry);
  const certDays = st.profile.certExpiry ? daysBetween(todayStr(), st.profile.certExpiry) : null;

  return (<div className="screen">
    <p className="eyebrow">Your status</p>
    <h1 className="h1">Me</h1>

    <div className="card">
      <p className="label">Certification</p>
      {certDays!=null
        ? <p className="muted">{certDays>0
            ? `About ${certDays} days until your Advanced certificate expires (set to ${st.profile.certExpiry}).`
            : "Your certificate appears to be expired. Book your recert."}<br/><br/>This app keeps you sharp. It does not renew your ticket. Renewal needs a 35 hour refresher class or the exam challenge through an approved provider.</p>
        : <p className="muted">No course date set. This app keeps you sharp but does not renew your ticket.</p>}
    </div>

    <div className="card">
      <p className="label">Environment</p>
      <p className="muted" style={{marginBottom:10}}>{ind?ind.label:""} · {evac==="remote"?"remote evacuation":"accessible site"}</p>
      <div className="seg">
        {INDUSTRIES.map(i=>(
          <button key={i.id} className={st.profile.industry===i.id?"sel":""}
            onClick={()=>setSt(p=>({...p,profile:{...p.profile,industry:i.id,evacOverride:null}}))}>{i.label}</button>
        ))}
      </div>
      <p className="label" style={{marginTop:8}}>This week I am working somewhere</p>
      <div className="btn-row">
        <button className={"btn "+(evac==="remote"?"btn-spruce":"btn-line")} onClick={()=>setSt(p=>({...p,profile:{...p.profile,evacOverride:"remote"}}))}>Remote</button>
        <button className={"btn "+(evac==="accessible"?"btn-spruce":"btn-line")} onClick={()=>setSt(p=>({...p,profile:{...p.profile,evacOverride:"accessible"}}))}>Near help</button>
      </div>
    </div>

    <h2 className="h2">Field readiness · all domains</h2>
    <div className="ringgrid">{board.map(({d,r})=> <Vital key={d.id} d={d} r={r}/>)}</div>

    <button className="btn btn-ghost" style={{marginTop:18}} onClick={()=>{
      if(confirm("Reset all your progress? This cannot be undone.")){
        ["afa_items","afa_domains","afa_streak"].forEach(k=>store.set(k, k==="afa_streak"?{count:0,last:null}:{}));
        setSt(p=>({...p, items:{}, domains:{}, streak:{count:0,last:null}}));
      }
    }}>Reset my progress</button>
  </div>);
}

/* ================= Nav + Disclaimer ================= */
function Nav({tab,setTab}){
  const items=[
    {id:"today",label:"Today",icon:<path d="M12 3l8 7h-2v9h-5v-6H11v6H6v-9H4z"/>},
    {id:"practice",label:"Practice",icon:<path d="M5 4h14v4H5zM5 10h14v4H5zM5 16h9v4H5z"/>},
    {id:"reference",label:"Reference",icon:<path d="M6 4h11a2 2 0 012 2v14H8a2 2 0 01-2-2z"/>},
    {id:"me",label:"Me",icon:<g><circle cx="12" cy="8" r="3.4"/><path d="M5 20a7 7 0 0114 0z"/></g>}
  ];
  return (<div className="nav">
    {items.map(it=>(
      <button key={it.id} className={tab===it.id?"active":""} onClick={()=>setTab(it.id)}>
        <svg viewBox="0 0 24 24" fill={tab===it.id?"#143D32":"none"} stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round">{it.icon}</svg>
        {it.label}<div className="ndot"/>
      </button>
    ))}
  </div>);
}
function Disclaimer({onClose}){
  return (<div className="modal-bg">
    <div className="modal">
      <h2 className="h2" style={{marginTop:0}}>Read this first</h2>
      <p className="disclaimer">Field Ready is a study and refresher tool for people who already hold Advanced First Aid training. It is not a substitute for certified training, for professional medical advice, or for emergency services. In a real emergency, follow your training and call for help.<br/><br/>
      The content in this version is an unverified draft. Do not rely on it for real treatment decisions until a qualified first aid instructor has reviewed and corrected it against current WorkSafeBC and CSA standards.</p>
      <button className="btn btn-amber" style={{marginTop:16}} onClick={onClose}>I understand</button>
    </div>
  </div>);
}

  document.getElementById("root").innerHTML='<div style="font-family:system-ui,sans-serif;max-width:420px;margin:60px auto;padding:0 24px;color:#0F1B2A;line-height:1.6">'+
    '<h2 style="color:#12827E">Content file not loaded</h2>'+
    '<p>This page needs <b>content.js</b> in the same folder. Make sure both files were uploaded together, then reload.</p>'+
    '<p style="color:#62707E;font-size:14px">content.js is built from the spreadsheet by running <code>node build-content.js</code>.</p></div>';
} else {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}
